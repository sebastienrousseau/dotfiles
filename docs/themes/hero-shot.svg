<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Shadow -->
  <rect x="10" y="10" width="780" height="430" rx="12" fill="rgba(0,0,0,0.3)" filter="blur(10px)" />
  
  <!-- Terminal Window -->
  <rect x="20" y="20" width="760" height="410" rx="10" fill="#1e1e2e" stroke="#313244" stroke-width="1" />
  
  <!-- Window Title Bar -->
  <path d="M20 30 a10 10 0 0 1 10 -10 h740 a10 10 0 0 1 10 10 v20 h-760 z" fill="#181825" />
  
  <!-- macOS Buttons -->
  <circle cx="40" cy="35" r="6" fill="#f38ba8" /> <!-- Red -->
  <circle cx="60" cy="35" r="6" fill="#fab387" /> <!-- Yellow -->
  <circle cx="80" cy="35" r="6" fill="#a6e3a1" /> <!-- Green -->
  
  <!-- Title -->
  <text x="400" y="38" font-family="JetBrains Mono, monospace" font-size="12" fill="#bac2de" text-anchor="middle">seb — .dotfiles — zsh</text>

  <!-- Mock Terminal Content -->
  <g font-family="JetBrains Mono, monospace" font-size="14">
    <!-- Starship Prompt -->
    <text x="40" y="80" fill="#89b4fa">λ</text>
    <text x="60" y="80" fill="#cdd6f4">~/.dotfiles</text>
    <text x="160" y="80" fill="#f5c2e7" font-weight="bold">on  feat/v0.2.493</text>
    
    <text x="40" y="110" fill="#cdd6f4">➜ dot --version</text>
    <text x="40" y="130" fill="#a6e3a1">.dotfiles v0.2.493 (2026 Edition)</text>

    <!-- dot doctor output -->
    <text x="40" y="170" fill="#cdd6f4">➜ dot doctor</text>
    <text x="40" y="195" fill="#f9e2af">Running Dotfiles Doctor...</text>
    
    <!-- Checklist items -->
    <text x="40" y="225" fill="#a6e3a1">  ✓ zsh</text>
    <text x="250" y="225" fill="#585b70">/usr/bin/zsh</text>
    
    <text x="40" y="245" fill="#a6e3a1">  ✓ starship</text>
    <text x="250" y="245" fill="#585b70">~/.local/bin/starship</text>
    
    <text x="40" y="265" fill="#a6e3a1">  ✓ nvim</text>
    <text x="250" y="265" fill="#585b70">/usr/bin/nvim</text>
    
    <text x="40" y="285" fill="#a6e3a1">  ✓ mise</text>
    <text x="250" y="285" fill="#585b70">~/.local/bin/mise</text>

    <!-- Success Footer -->
    <text x="40" y="320" fill="#a6e3a1" font-weight="bold">Summary</text>
    <text x="40" y="340" fill="#a6e3a1">  ✓ All systems healthy</text>

    <!-- New prompt -->
    <text x="40" y="380" fill="#89b4fa">λ</text>
    <text x="60" y="380" fill="#cdd6f4">~/.dotfiles</text>
    <text x="160" y="380" fill="#f5c2e7" font-weight="bold">on  feat/v0.2.493</text>
    <rect x="330" y="368" width="8" height="18" fill="#cdd6f4">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
