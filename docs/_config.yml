title: ".dotfiles"
description: "Cross-platform, signed, local-first dotfiles for macOS, Linux, and WSL — published at doc.dotfiles.io."
url: "https://doc.dotfiles.io"
baseurl: ""

# Jekyll renders this site from docs/ — see .github/workflows/pages.yml.
# Theme is the GitHub-hosted Cayman skin (zero-Gemfile setup); switch to
# `remote_theme: just-the-docs/just-the-docs` later if a richer
# navigation/search UX is wanted (requires plugin allowlist update on
# GH Pages side).
theme: jekyll-theme-cayman

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

relative_links:
  enabled: true
  collections: true

# Treat *.md as pages so cross-page links work without trailing-slash
# kludges; include CNAME so the published artifact preserves it across
# workflow deploys.
include:
  - CNAME
  - .well-known

exclude:
  - "*.tmpl"
  - "manual/_toc.yml"
  - "scripts/"
  - "Gemfile"
  - "Gemfile.lock"
  - "vendor/"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Disable Liquid rendering for all pages. Many of our docs include
# chezmoi/Go-template snippets like `{{ .variable }}` inside fenced
# code blocks; Liquid runs BEFORE kramdown sees those fences and would
# try to resolve the placeholders as Liquid expressions. Turning Liquid
# off site-wide is simpler than wrapping every code block in
# `{% raw %}...{% endraw %}`. We don't use Jekyll includes or
# site-variable interpolation in docs/, so nothing is lost.
defaults:
  - scope:
      path: ""
    values:
      render_with_liquid: false
