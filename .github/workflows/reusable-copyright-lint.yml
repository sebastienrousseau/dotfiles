name: Reusable Copyright Lint

on:
  workflow_call:
    inputs:
      extensions:
        description: Comma-separated file extensions to check.
        required: false
        default: "sh,lua,nix,py,js,ts,go,rs,java,cpp,c,h,hpp"
        type: string
      excludes:
        description: Regex matched against each file path; skipped if it matches.
        required: false
        default: '(^|/)(node_modules|\.git|vendor|target|build)/|\.tmpl$|(^|/)\defaults/.chezmoitemplates/'
        type: string

permissions:
  contents: read

jobs:
  copyright-lint:
    name: Copyright Headers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run copyright header validator
        run: |
          set -euo pipefail
          bash tools/ci/check-copyright-headers.sh \
            "--extensions=${{ inputs.extensions }}" \
            "--excludes=${{ inputs.excludes }}"
