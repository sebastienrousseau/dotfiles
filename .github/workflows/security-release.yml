name: Release / Security Attestation

on:
  release:
    # `created` fires once when the release first appears (covers the
    # SBOM + provenance generated from source). `published` fires when
    # a human edits a draft → public, by which point asset-uploading
    # workflows (manual-publish.yml etc.) have finished — that's when
    # we sign the full asset manifest. Both runs are idempotent.
    types: [created, published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v0.2.473)"
        required: true
        type: string

# Least-privilege top-level — Scorecard's Token-Permissions check
# flags top-level write scopes. The release-attaching jobs below
# carry their own `contents: write` declarations.
permissions:
  contents: read

jobs:
  sbom:
    name: Release / SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload SBOM + Cosign sig/cert as release assets
      id-token: write   # OIDC token for Cosign keyless signing (#876)
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: dotfiles-sbom.spdx.json
          upload-release-assets: false

      - name: Calculate hash
        id: hash
        run: |
          sha256sum dotfiles-sbom.spdx.json > sbom.sha256
          echo "hash=$(base64 -w 0 sbom.sha256)" >> $GITHUB_OUTPUT

      # Cosign keyless signing of the SBOM (closes #876). Uses the
      # workflow's OIDC token to mint a short-lived certificate from
      # Fulcio; signature + certificate + Rekor entry are published
      # alongside the SBOM as release assets so consumers can verify
      # provenance without any static-key key-management overhead.
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Sign SBOM with Cosign (keyless via Fulcio + Rekor)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature dotfiles-sbom.spdx.json.sig \
            --output-certificate dotfiles-sbom.spdx.json.pem \
            dotfiles-sbom.spdx.json

          # Print verification recipe to the step summary so
          # downstream consumers don't have to read this workflow.
          {
            echo "### Cosign verification recipe"
            echo ""
            echo '```sh'
            echo "cosign verify-blob \\"
            echo "  --certificate dotfiles-sbom.spdx.json.pem \\"
            echo "  --signature dotfiles-sbom.spdx.json.sig \\"
            echo "  --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  dotfiles-sbom.spdx.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SBOM + Cosign artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotfiles-sbom
          path: |
            dotfiles-sbom.spdx.json
            dotfiles-sbom.spdx.json.sig
            dotfiles-sbom.spdx.json.pem

      - name: Attach SBOM + Cosign artefacts to the release
        # Under workflow_dispatch we also re-upload the SBOM itself —
        # the freshly-generated file will have a different hash than
        # whatever was attached when the release first published, so
        # the .sig / .pem must match the new SBOM bytes. The release-
        # event path uploads only the sig+cert (the SBOM is added by
        # the sbom-action step's `upload-release-assets` elsewhere).
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            dotfiles-sbom.spdx.json \
            dotfiles-sbom.spdx.json.sig \
            dotfiles-sbom.spdx.json.pem \
            --clobber

  manifest:
    name: Release / Signed Asset Manifest
    # Runs on `published` (after asset-uploaders have finished) to
    # build ALL_SHA256SUMS over every release asset and Cosign-sign
    # it. The result: one signed file covers every artefact on the
    # release, so downstream verifiers don't need to enumerate.
    if: github.event_name == 'workflow_dispatch' || github.event.action == 'published'
    runs-on: ubuntu-latest
    needs: [sbom]
    permissions:
      contents: write   # upload manifest + sig + cert
      id-token: write   # OIDC for Cosign keyless
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Download every release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p assets
          cd assets
          # Pull everything attached to the release at this moment.
          # Re-running the job after additional assets land will pick
          # them up; the upload step uses --clobber so the manifest
          # tracks current state.
          gh release download "$RELEASE_TAG" --dir . || true
          ls -la

      - name: Build ALL_SHA256SUMS (excludes manifest's own .sig/.pem/itself)
        run: |
          set -euo pipefail
          cd assets
          # Exclude prior manifest signatures so re-runs are idempotent.
          # Sort by filename for byte-stable output across runners.
          rm -f ALL_SHA256SUMS ALL_SHA256SUMS.sig ALL_SHA256SUMS.pem
          find . -maxdepth 1 -type f ! -name 'ALL_SHA256SUMS*' -printf '%f\n' \
            | sort \
            | xargs -d '\n' -I {} sha256sum {} \
            > ALL_SHA256SUMS
          echo "=== ALL_SHA256SUMS ==="
          cat ALL_SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Sign ALL_SHA256SUMS with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        working-directory: assets
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature ALL_SHA256SUMS.sig \
            --output-certificate ALL_SHA256SUMS.pem \
            ALL_SHA256SUMS

          {
            echo "### Unified manifest verification"
            echo ""
            echo "Verifies every release asset in one command."
            echo ""
            echo '```sh'
            echo "cosign verify-blob \\"
            echo "  --certificate ALL_SHA256SUMS.pem \\"
            echo "  --signature ALL_SHA256SUMS.sig \\"
            echo "  --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  ALL_SHA256SUMS"
            echo "# Then check every other asset against the manifest:"
            echo "sha256sum -c ALL_SHA256SUMS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload signed manifest to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        working-directory: assets
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            ALL_SHA256SUMS \
            ALL_SHA256SUMS.sig \
            ALL_SHA256SUMS.pem \
            --clobber

  provenance:
    name: Release / SLSA Provenance
    needs: [sbom]
    permissions:
      actions: read
      id-token: write
      contents: write
    # NOTE: The SLSA generator's `builder-fetch.sh` requires `BUILDER_REF`
    # to be `refs/tags/vX.Y.Z` (regex-checked at start of fetch). A SHA-
    # pinned `@<sha>` makes the ref a bare hash and the script exits 2
    # — see slsa-framework/slsa-github-generator#1163. The SLSA team's
    # documented recommendation is to pin by tag, which is what we do
    # here. v2.1.0 = f7dd8c54c2067bafc12ca7a55595d5ee9b75204a (verify
    # before each bump). This single tag-pinned reusable workflow is the
    # documented exception to the repo's otherwise-strict SHA-pinning
    # convention; Scorecard's Pinned-Dependencies check explicitly
    # exempts SLSA-generator from SHA pinning for this reason.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.sbom.outputs.hash }}"
      upload-assets: true
      # SLSA `upload-assets` job is gated on
      #   startsWith(github.ref, 'refs/tags/') || inputs.upload-tag-name != ''
      # A `workflow_dispatch` re-run carries `github.ref = refs/heads/<branch>`,
      # which would skip the upload. Pass the dispatch-provided tag through so
      # operators can retroactively attach provenance to an existing release.
      # Release-event runs leave this empty (the first arm of the condition
      # above already matches the tag ref).
      upload-tag-name: ${{ inputs.release_tag || '' }}

  verify-release-integrity:
    name: Release / Verify Integrity
    runs-on: ubuntu-latest
    needs: [sbom, provenance]
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dotfiles-sbom
          path: .

      - name: Verify SBOM hash
        env:
          EXPECTED_HASH_B64: ${{ needs.sbom.outputs.hash }}
        run: |
          set -euo pipefail
          test -f dotfiles-sbom.spdx.json
          expected_line="$(echo "$EXPECTED_HASH_B64" | base64 --decode)"
          actual_line="$(sha256sum dotfiles-sbom.spdx.json)"
          if [[ "$expected_line" != "$actual_line" ]]; then
            echo "::error::SBOM hash mismatch"
            echo "expected: $expected_line"
            echo "actual:   $actual_line"
            exit 1
          fi
          echo "SBOM hash verified"

      - name: Verify provenance asset exists on release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/releases/tags/${RELEASE_TAG}" --jq '.assets[].name' > "$RUNNER_TEMP/release-assets.txt"
          if ! grep -E '\.intoto\.jsonl$' "$RUNNER_TEMP/release-assets.txt" >/dev/null; then
            echo "::error::No SLSA provenance asset (*.intoto.jsonl) found in release assets"
            echo "Assets found:"
            cat "$RUNNER_TEMP/release-assets.txt"
            exit 1
          fi
          echo "Release provenance asset verified"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Download cosign signature + certificate from the release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release download "$RELEASE_TAG" \
            --pattern dotfiles-sbom.spdx.json.sig \
            --pattern dotfiles-sbom.spdx.json.pem \
            --clobber

      - name: Verify SBOM signature with Cosign
        # `gh attestation verify` only finds attestations from
        # `actions/attest-*`. Our SBOM is signed via Cosign keyless
        # (Fulcio + Rekor) in the sbom job above, so verify with the
        # same tool against the same artefacts. Identity binds to the
        # repo that produced the signature — any rebuild from a fork
        # would fail this check.
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cosign verify-blob \
            --certificate dotfiles-sbom.spdx.json.pem \
            --signature dotfiles-sbom.spdx.json.sig \
            --certificate-identity-regexp "^https://github.com/${REPO}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dotfiles-sbom.spdx.json
          echo "SBOM Cosign signature verified"
