name: Release / Security Attestation

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v0.2.473)"
        required: true
        type: string

# Least-privilege top-level — Scorecard's Token-Permissions check
# flags top-level write scopes. The release-attaching jobs below
# carry their own `contents: write` declarations.
permissions:
  contents: read

jobs:
  sbom:
    name: Release / SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload SBOM + Cosign sig/cert as release assets
      id-token: write   # OIDC token for Cosign keyless signing (#876)
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: dotfiles-sbom.spdx.json
          upload-release-assets: false

      - name: Calculate hash
        id: hash
        run: |
          sha256sum dotfiles-sbom.spdx.json > sbom.sha256
          echo "hash=$(base64 -w 0 sbom.sha256)" >> $GITHUB_OUTPUT

      # Cosign keyless signing of the SBOM (closes #876). Uses the
      # workflow's OIDC token to mint a short-lived certificate from
      # Fulcio; signature + certificate + Rekor entry are published
      # alongside the SBOM as release assets so consumers can verify
      # provenance without any static-key key-management overhead.
      - name: Install Cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
        with:
          cosign-release: v2.4.1

      - name: Sign SBOM with Cosign (keyless via Fulcio + Rekor)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature dotfiles-sbom.spdx.json.sig \
            --output-certificate dotfiles-sbom.spdx.json.pem \
            dotfiles-sbom.spdx.json

          # Print verification recipe to the step summary so
          # downstream consumers don't have to read this workflow.
          {
            echo "### Cosign verification recipe"
            echo ""
            echo '```sh'
            echo "cosign verify-blob \\"
            echo "  --certificate dotfiles-sbom.spdx.json.pem \\"
            echo "  --signature dotfiles-sbom.spdx.json.sig \\"
            echo "  --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  dotfiles-sbom.spdx.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SBOM + Cosign artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotfiles-sbom
          path: |
            dotfiles-sbom.spdx.json
            dotfiles-sbom.spdx.json.sig
            dotfiles-sbom.spdx.json.pem

      - name: Attach Cosign artefacts to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            dotfiles-sbom.spdx.json.sig \
            dotfiles-sbom.spdx.json.pem \
            --clobber

  provenance:
    name: Release / SLSA Provenance
    needs: [sbom]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.sbom.outputs.hash }}"
      upload-assets: true

  verify-release-integrity:
    name: Release / Verify Integrity
    runs-on: ubuntu-latest
    needs: [sbom, provenance]
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dotfiles-sbom
          path: .

      - name: Verify SBOM hash
        env:
          EXPECTED_HASH_B64: ${{ needs.sbom.outputs.hash }}
        run: |
          set -euo pipefail
          test -f dotfiles-sbom.spdx.json
          expected_line="$(echo "$EXPECTED_HASH_B64" | base64 --decode)"
          actual_line="$(sha256sum dotfiles-sbom.spdx.json)"
          if [[ "$expected_line" != "$actual_line" ]]; then
            echo "::error::SBOM hash mismatch"
            echo "expected: $expected_line"
            echo "actual:   $actual_line"
            exit 1
          fi
          echo "SBOM hash verified"

      - name: Verify provenance asset exists on release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/releases/tags/${RELEASE_TAG}" --jq '.assets[].name' > "$RUNNER_TEMP/release-assets.txt"
          if ! grep -E '\.intoto\.jsonl$' "$RUNNER_TEMP/release-assets.txt" >/dev/null; then
            echo "::error::No SLSA provenance asset (*.intoto.jsonl) found in release assets"
            echo "Assets found:"
            cat "$RUNNER_TEMP/release-assets.txt"
            exit 1
          fi
          echo "Release provenance asset verified"

      - name: Install verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Verify SBOM attestation cryptographically
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh attestation verify dotfiles-sbom.spdx.json --repo "${REPO}" --format json >"$RUNNER_TEMP/attestation-verify.json"
          if ! jq -e 'length > 0' "$RUNNER_TEMP/attestation-verify.json" >/dev/null; then
            echo "::error::No valid attestations were returned for dotfiles-sbom.spdx.json"
            exit 1
          fi
          echo "SBOM attestation verified"
