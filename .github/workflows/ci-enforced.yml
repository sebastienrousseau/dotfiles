name: CI (Standards Enforced)

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  pull_request:
    branches: [master]
  # Manual trigger for full CI
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CHEZMOI_VERSION: "2.47.1"
  # Enforce warnings as errors globally
  WARNINGS_AS_ERRORS: "1"

jobs:
  # ============================================================================
  # STAGE 1: LINT (Zero-warning policy enforced, reuses shared workflow)
  # ============================================================================
  lint-shell:
    name: Lint / Shell (Zero Warnings)
    uses: ./.github/workflows/reusable-shell-lint.yml
    with:
      include_tests: false
      shellcheck_severity: error
      shellcheck_excludes: SC1091,SC2030,SC2031
      fail_on_shellcheck: true
      run_shfmt: true
      shfmt_targets: scripts/**/*.sh install.sh .chezmoitemplates/**/*.sh

  lint-lua:
    name: Lint / Lua (Zero Warnings)
    uses: ./.github/workflows/reusable-lua-lint.yml
    with:
      target: dot_config/nvim
      strict: true
      stylua_version: "0.20.0"

  lint-nix:
    name: Lint / Nix (Zero Warnings)
    uses: ./.github/workflows/reusable-nix-lint.yml
    with:
      flake_dir: nix
      run_fmt_check: true
      run_flake_check: true
      run_build: false

  lint-copyright:
    name: Lint / Copyright Headers (Zero Tolerance)
    uses: ./.github/workflows/reusable-copyright-lint.yml

  # ============================================================================
  # STAGE 2: SECURITY (Mandatory - No bypass allowed)
  # ============================================================================
  security-secrets:
    name: Security / Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Gitleaks (No bypass)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-dependency-audit:
    name: Security / Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Audit shell dependencies
        run: |
          echo "::notice::Auditing external dependencies in shell scripts"
          # Check for curl/wget downloads without verification
          if rg -n "curl.*\|.*sh" --type sh .; then
            echo "::error::Found potentially unsafe curl|sh pattern"
            exit 1
          fi
          # Check for unverified downloads
          if rg -n "wget.*-O.*-.*\|.*sh" --type sh .; then
            echo "::error::Found potentially unsafe wget pattern"
            exit 1
          fi
      - name: Check for hardcoded secrets patterns
        run: |
          echo "::notice::Scanning for hardcoded secrets patterns"
          # More aggressive secret detection
          if rg -i "password|token|key|secret" --type sh --type lua | grep -E "=.*['\"][^'\"]{8,}['\"]"; then
            echo "::error::Potential hardcoded secret detected"
            exit 1
          fi

  security-infrastructure:
    name: Security / Infrastructure Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Checkov Infrastructure Security
        uses: bridgecrewio/checkov-action@9ff61ad7df06a619665acec928d66258bd6adc8f # v12.3094.0
        with:
          framework: dockerfile,yaml,secrets
          quiet: false
          soft_fail: false  # FAIL on security issues
          output_format: sarif
          output_file_path: reports/checkov.sarif
      - name: Upload Checkov results to GitHub Security
        if: always() && hashFiles('reports/checkov.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: reports/checkov.sarif

  # ============================================================================
  # STAGE 3: TEST MATRIX (Linux + macOS enforced)
  # ============================================================================
  test-matrix:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10  # Enforced 10-minute timeout
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]  # BOTH platforms enforced
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Cache Chezmoi
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.local/bin/chezmoi
          key: chezmoi-${{ runner.os }}-${{ env.CHEZMOI_VERSION }}
      - name: Setup Chezmoi
        run: |
          if [[ ! -x "$HOME/.local/bin/chezmoi" ]]; then
            bash scripts/ci/install-chezmoi-verified.sh "${{ env.CHEZMOI_VERSION }}" "$HOME/.local/bin"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Chezmoi Apply Test
        run: |
          chezmoi init
          chezmoi apply --verbose --dry-run
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-test-${{ runner.os }}
          path: ~/.local/share/chezmoi/.log
          retention-days: 5

  test-unit:
    name: Test / Unit Tests (100% Coverage)
    uses: ./.github/workflows/reusable-test-suite.yml
    with:
      min_coverage: "100"
      run_integration: true
      run_strict_checks: true
      timeout_minutes: 10

  # ============================================================================
  # STAGE 4: MERGE GATE (All checks must pass)
  # ============================================================================
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [
      lint-shell,
      lint-lua,
      lint-nix,
      lint-copyright,
      security-secrets,
      security-dependency-audit,
      security-infrastructure,
      test-matrix,
      test-unit,
    ]
    steps:
      - name: All checks passed
        run: |
          echo "::notice::All CI checks passed - merge approved"
          echo "✅ All quality gates satisfied"

# ============================================================================
# NIGHTLY JOBS (Advanced checks)
# ============================================================================
  nightly:
    name: Nightly / ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        check: [dependency-updates, beta-testing, extended-tests]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Dependency Update Check
        if: matrix.check == 'dependency-updates'
        run: |
          echo "::notice::Checking for available dependency updates"
          ./scripts/maintenance/check-updates.sh || true
      - name: Beta/Nightly Testing
        if: matrix.check == 'beta-testing'
        run: |
          echo "::notice::Testing with beta/nightly versions"
          export USE_BETA_VERSIONS=1
          ./tests/framework/test_runner.sh || true
      - name: Extended Test Suite
        if: matrix.check == 'extended-tests'
        run: |
          echo "::notice::Running extended test suite"
          export RUN_EXTENDED=1
          ./tests/framework/test_runner.sh || true
