name: CodeQL

on:
  push:
    branches: [master]
    # Only run CodeQL when relevant files change
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '.github/workflows/**'
  merge_group:
    branches: [master]
    # NOTE: `paths:` is not honored under merge_group — actionlint warns
    # if present. Merge-queue runs always execute the full workflow.
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday with main CI

# Cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege top-level — Scorecard's Token-Permissions check
# flags any non-`read` token granted at the workflow level. The
# write scope CodeQL needs (`security-events: write` to upload the
# SARIF) is granted on the analyze job only.
permissions:
  contents: read

jobs:
  analyze:
    name: Security / CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload-sarif
      actions: read
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: actions,python
      - name: Perform Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
