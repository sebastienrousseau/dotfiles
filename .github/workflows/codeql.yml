name: CodeQL

on:
  push:
    # No path filter on push: SAST must run on EVERY commit to the default
    # branch (OpenSSF Scorecard counts the share of commits a SAST tool ran on).
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '.github/workflows/**'
  merge_group:
    branches: [main, master]
    # NOTE: `paths:` is not honored under merge_group — actionlint warns
    # if present. Merge-queue runs always execute the full workflow.
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday with main CI

# Cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege top-level — Scorecard's Token-Permissions check
# flags any non-`read` token granted at the workflow level. The
# write scope CodeQL needs (`security-events: write` to upload the
# SARIF) is granted on the analyze job only.
permissions:
  contents: read

jobs:
  analyze:
    name: Security / CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload-sarif
      actions: read
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: actions,python
      - name: Perform Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
