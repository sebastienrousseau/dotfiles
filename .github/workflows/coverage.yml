name: Coverage

# Bash code coverage via kcov + Codecov upload + delta threshold gate.
# Replaces the previous aspirational "100% Coverage" label with real
# measurement. Closes #856.

on:
  pull_request:
    branches: [master]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.chezmoitemplates/**'
      - 'dot_local/bin/**'
      - 'scripts/ci/run-coverage.sh'
      - '.github/workflows/coverage.yml'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage / kcov
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache kcov binary
        id: kcov-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/kcov
          # Pin cache key to the kcov version embedded in the verified
          # installer. Bump in lockstep with KCOV_VERSION there.
          key: kcov-v43-${{ runner.os }}-${{ runner.arch }}

      - name: Install kcov (SHA256-verified source build)
        if: steps.kcov-cache.outputs.cache-hit != 'true'
        # Ubuntu 24.04 (ubuntu-latest) dropped `kcov` from its apt
        # universe in late 2024, so the previous `apt-get install kcov`
        # invocation no longer resolves. The verified installer builds
        # kcov v43 from a SHA256-pinned upstream tarball — same defence-
        # in-depth pattern as install-chezmoi-verified.sh.
        run: bash scripts/ci/install-kcov-verified.sh "$HOME/.local"

      - name: Ensure ancillary linters are present
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck ripgrep shfmt

      - name: Add kcov to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run coverage
        env:
          # Initial floor — start permissive while Slice 1 of #883
          # establishes the baseline. Tighten in lockstep with each
          # slice that lands real test coverage (target ≥95%).
          MIN_COVERAGE_PCT: '0'
        run: bash scripts/ci/run-coverage.sh

      - name: Upload lcov.info artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 30

      - name: Upload to Codecov
        # Tokenless OSS upload — no secret needed for public repos.
        # When the repo is private or rate-limited, set CODECOV_TOKEN.
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        if: always()
        continue-on-error: true   # don't block PRs on Codecov flakiness
        with:
          files: coverage/lcov.info
          flags: bash-kcov
          fail_ci_if_error: false
          verbose: false

      - name: Coverage delta gate
        # Codecov posts a PR status check on its own (Codecov GitHub
        # App). This step is a local belt-and-suspenders that fails
        # the build when measured coverage drops below MIN_COVERAGE_PCT.
        # The script already exits non-zero on threshold failure; this
        # job-level step is redundant on purpose so the gate is
        # visible in the workflow's own status column.
        if: success() || failure()
        run: |
          set -euo pipefail
          if [ ! -s coverage/lcov.info ]; then
            echo "::warning::no lcov.info produced"
            exit 0
          fi
          python3 -c '
          import sys
          total = covered = 0
          with open("coverage/lcov.info") as f:
              for line in f:
                  if line.startswith("DA:"):
                      total += 1
                      if int(line.split(",")[-1]) > 0:
                          covered += 1
          pct = (covered * 100.0 / total) if total else 0.0
          print(f"Coverage: {covered}/{total} = {pct:.2f}%")
          '
