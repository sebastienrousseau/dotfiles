name: Reliability Gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pinned chezmoi version consumed by the `setup-chezmoi` composite
  # action (which reads $CHEZMOI_VERSION when no `version:` input is
  # supplied). Keep in lockstep with .github/workflows/ci.yml.
  CHEZMOI_VERSION: "2.47.1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reliability:
    name: Reliability / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 = Apple Silicon (M-series); macos-latest still
        # resolves to Intel. Both kept to catch arch-specific drift.
        os: [ubuntu-latest, macos-latest, macos-14]
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install shfmt + shellcheck
        # tests/regression/test_static_analysis.sh shells out to both
        # tools but the GitHub-hosted runners don't preinstall shfmt
        # (shellcheck is on ubuntu-latest but not macOS). Without the
        # tools every `! shfmt ...` check inverts a "command not found"
        # into a "fail" and the static-analysis test reports every
        # file in CHANGED_SCRIPTS as broken regardless of content.
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Linux)
              sudo apt-get update -qq
              sudo apt-get install -y -qq shfmt shellcheck
              ;;
            Darwin)
              brew install shfmt shellcheck
              ;;
          esac
          shfmt --version
          shellcheck --version | head -2

      - name: Reliability audit
        run: bash ./scripts/qa/reliability-audit.sh --with-integration

  examples-contract:
    name: Examples Contract
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate executable examples
        run: bash ./scripts/qa/validate-examples.sh

  wsl-contract:
    name: WSL Contract
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate WSL parity contract
        run: bash ./scripts/qa/wsl-contract.sh

  # PowerShell parity contract — verifies the dotfiles PowerShell
  # profile loads, defines the expected function shims (dot, d, ll,
  # la, cat), and passes Invoke-ScriptAnalyzer at Error severity.
  # Runs on windows-latest so the parity claim in the README is
  # actually exercised in CI rather than aspirational. Closes #860.
  powershell-contract:
    name: PowerShell Contract
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Chezmoi
        # The composite resolves the chezmoi binary into a known
        # location and appends it to PATH so the .ps1 contract can
        # render the template.
        uses: ./.github/actions/setup-chezmoi

      - name: Run PowerShell parity contract
        shell: pwsh
        run: ./scripts/qa/powershell-contract.ps1

  reliability-summary:
    name: Reliability Summary
    runs-on: ubuntu-latest
    needs: [reliability, examples-contract, wsl-contract, powershell-contract]
    if: always()
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Reliability summary
        run: |
          if [[ "${{ needs.reliability.result }}" != "success" ]]; then
            echo "::error::Reliability matrix failed"
            exit 1
          fi
          if [[ "${{ needs.examples-contract.result }}" != "success" ]]; then
            echo "::error::Examples contract failed"
            exit 1
          fi
          if [[ "${{ needs.wsl-contract.result }}" != "success" ]]; then
            echo "::error::WSL contract failed"
            exit 1
          fi
          if [[ "${{ needs.powershell-contract.result }}" != "success" ]]; then
            echo "::error::PowerShell contract failed"
            exit 1
          fi
          echo "Reliability matrix passed"
