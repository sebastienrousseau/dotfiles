name: DCO

# Developer Certificate of Origin check: every commit in a pull request must
# carry a `Signed-off-by:` trailer (git commit -s), certifying the contributor
# agrees to the DCO 1.1 (see the repo-root DCO file). Satisfies the OpenSSF
# Best Practices `dco` criterion.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    name: Check sign-off
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner (block mode)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify every commit is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            if ! git log -1 --format='%B' "$sha" \
                | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit missing Signed-off-by — $(git log -1 --format='%h %s' "$sha")"
              fail=1
            fi
          done < <(git rev-list "${BASE_SHA}..${HEAD_SHA}")
          if [ "$fail" -ne 0 ]; then
            echo "Add the DCO sign-off with:  git commit -s"
            echo "Fix an existing branch with: git rebase --signoff ${BASE_SHA}"
            exit 1
          fi
          echo "All commits carry a Signed-off-by line. ✓"
