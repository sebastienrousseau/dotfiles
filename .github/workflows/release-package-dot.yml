name: Release / Package dot CLI

# On every release, package a standalone tarball + zip of the dot CLI
# (bin/, lib/, share/) and attach to the release as a distribution-
# ready artefact. Downstream distribution workflows
# (release-distribute.yml) hash the tarball and push to Homebrew /
# Scoop / AUR taps.
#
# The tarball is the deterministic, distribution-friendly bundle of:
#   bin/dot, bin/dot-*           — dispatcher + companions
#   bin/dot.ps1, bin/dot.cmd     — Windows entrypoint + cmd shim (Scoop)
#   lib/dot/*                    — sourced helpers
#   share/man/man1/dot.1         — man page
#   share/zsh/site-functions/_dot
#   share/bash-completion/completions/dot
#   share/fish/vendor_completions.d/dot.fish
#
# The Homebrew formula in install/homebrew/dot.rb installs from this
# exact layout — keep them in lockstep.

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v0.2.503)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Package dot CLI tarball + zip
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write      # upload release assets
      id-token: write      # OIDC for keyless build-provenance attestation
      attestations: write  # write the SLSA provenance attestation
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF#refs/tags/}}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stage layout for distribution
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          stage="dot-${VERSION}"
          mkdir -p "$stage"/{bin,lib/dot,share/man/man1,share/zsh/site-functions,share/bash-completion/completions,share/fish/vendor_completions.d}

          # Dispatcher + companions
          cp bin/dot "$stage/bin/"
          for f in bin/dot-*; do [[ -f "$f" ]] && cp "$f" "$stage/bin/"; done

          # Windows entrypoint + cmd shim for Scoop. The PowerShell
          # script is the real driver; the .cmd is a one-line wrapper
          # so plain cmd.exe (and Scoop's shim generator) can launch
          # it. Synthesized rather than committed since it has no
          # variant content.
          if [[ -f bin/dot.ps1 ]]; then
            cp bin/dot.ps1 "$stage/bin/dot.ps1"
            # CRLF line endings: cmd.exe is strict about them, and the
            # zip is consumed by Scoop on Windows where text-mode unzip
            # is not implicit. printf with %% escapes %~dp0 and %*
            # against the shell pass.
            {
              printf '@echo off\r\n'
              printf 'powershell -ExecutionPolicy Bypass -NoProfile -File "%%~dp0dot.ps1" %%*\r\n'
            } > "$stage/bin/dot.cmd"
          else
            echo "::warning::bin/dot.ps1 not found — Scoop install will lack a Windows entrypoint"
          fi

          # Sourced helpers
          cp lib/dot/*.sh "$stage/lib/dot/"
          # README.md kept alongside helpers for context; harmless on install.
          [[ -f lib/dot/README.md ]] && cp lib/dot/README.md "$stage/lib/dot/"

          # Man page
          cp share/man/man1/dot.1 "$stage/share/man/man1/"

          # Completions — source paths differ from install paths.
          cp share/completions/zsh/_dot "$stage/share/zsh/site-functions/_dot"
          cp defaults/dot_local/share/bash-completion/completions/dot "$stage/share/bash-completion/completions/dot"
          cp defaults/dot_config/fish/functions/dot.fish "$stage/share/fish/vendor_completions.d/dot.fish"

          echo "=== staged layout ==="
          find "$stage" -type f | sort

      - name: Build tarball (deterministic)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          stage="dot-${VERSION}"
          # GNU tar deterministic flags: stable mtime, owner, sort order.
          # Without these, byte-for-byte hashes drift across runners.
          TZ=UTC tar --sort=name \
            --mtime='1970-01-01 00:00:00 UTC' \
            --owner=0 --group=0 --numeric-owner \
            -czf "dot-${VERSION}.tar.gz" "$stage"

          # Windows-friendly zip variant for Scoop. zip's `-X` strips
          # extra file attrs; `-D` skips directory entries for stable
          # hashing.
          zip -X -D -r "dot-${VERSION}.zip" "$stage"

          echo "=== artefact sizes ==="
          ls -la "dot-${VERSION}".{tar.gz,zip}

      # SLSA build provenance for the release artefacts. Keyless via OIDC
      # (Fulcio + Rekor); verify with `gh attestation verify dot-<v>.tar.gz
      # --repo sebastienrousseau/dotfiles`. Complements the Cosign-signed
      # SBOM + asset manifest in security-release.yml.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dot-${{ steps.ver.outputs.version }}.tar.gz
            dot-${{ steps.ver.outputs.version }}.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "dot-${VERSION}.tar.gz" \
            "dot-${VERSION}.zip" \
            --clobber
