name: Pre-Commit Hooks

# Runs the same `pre-commit` hook chain CI uses, on every PR + on push to
# master. This makes the linting surface (typos-cli, actionlint, yamllint,
# markdownlint-cli2, luacheck, stylua, shellcheck, shfmt, hadolint,
# gitleaks, detect-secrets, the repo-local custom hooks) gate the PR
# the same way they gate local commits.
#
# Added under #866 to enforce the yamllint + markdownlint additions
# (the other hooks were already CI-enforced via separate workflows).

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-Commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Setup Python (for pre-commit + yamllint)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Setup Node.js (for markdownlint-cli2)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Setup Go (for actionlint)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'

      - name: Install pre-commit
        run: pipx install pre-commit

      - name: Cache pre-commit hook environments
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('config/pre-commit-config.yaml') }}

      - name: Run pre-commit (yamllint hook)
        run: pre-commit run yamllint --all-files --config config/pre-commit-config.yaml --show-diff-on-failure

      - name: Run pre-commit (markdownlint-cli2 hook)
        run: pre-commit run markdownlint-cli2 --all-files --config config/pre-commit-config.yaml --show-diff-on-failure

      - name: Run pre-commit (typos hook)
        run: pre-commit run typos --all-files --config config/pre-commit-config.yaml --show-diff-on-failure

      - name: Run pre-commit (actionlint hook)
        run: pre-commit run actionlint --all-files --config config/pre-commit-config.yaml --show-diff-on-failure
