name: Sync Versions

on:
  push:
    branches: [main, 'feat/v*']
    paths:
      - '**/*.md'
      - 'package.json'
      - 'scripts/version-sync.sh'
      - 'docs/operations/VERSION_SYNC.md'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.md'
      - 'package.json'
      - 'scripts/version-sync.sh'
      - 'docs/operations/VERSION_SYNC.md'
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Target version to sync (defaults to package.json)'
        required: false
        type: string

# Least-privilege top-level — write is granted on the sync job
# only (it commits/pushes the version bump). Read-only verify jobs
# keep top-level read.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Version Sync
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq ripgrep

      - name: Verify versions
        run: ./scripts/version-sync.sh --verify

  verify-protected:
    name: Verify Version Sync (Protected Branch)
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq ripgrep

      - name: Verify versions (no auto-commit on protected branch)
        run: ./scripts/version-sync.sh --verify

  sync:
    name: Sync Version Numbers
    if: github.event_name != 'pull_request' && github.ref_name != 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # commit + push version-bump diff
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq ripgrep

      - name: Determine target version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.target_version }}" ]]; then
            TARGET_VERSION="${{ github.event.inputs.target_version }}"
          else
            TARGET_VERSION="$(jq -r '.version' package.json)"
          fi
          echo "target_version=$TARGET_VERSION" >> "$GITHUB_OUTPUT"
          echo "Target version: $TARGET_VERSION"

      - name: Configure signed commits
        env:
          ACTIONS_BOT_SIGNING_KEY: ${{ secrets.ACTIONS_BOT_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${ACTIONS_BOT_SIGNING_KEY}" ]]; then
            echo "::error::Missing ACTIONS_BOT_SIGNING_KEY secret"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "${ACTIONS_BOT_SIGNING_KEY}" > ~/.ssh/actions_bot_signing_key
          chmod 600 ~/.ssh/actions_bot_signing_key
          git config --local gpg.format ssh
          git config --local user.signingkey ~/.ssh/actions_bot_signing_key
          git config --local commit.gpgsign true

      - name: Sync versions
        run: |
          TARGET_VERSION="${{ steps.version.outputs.target_version }}"
          if [[ -n "$TARGET_VERSION" ]]; then
            ./scripts/version-sync.sh "$TARGET_VERSION"
          else
            ./scripts/version-sync.sh
          fi

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          TARGET_VERSION="${{ steps.version.outputs.target_version }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add -A
          # -s adds the DCO Signed-off-by trailer (the repo's "Check
          # sign-off" workflow requires every PR commit to carry one, so
          # without it this bot's auto-commit fails DCO on the PR it pushes
          # to). -S keeps the existing SSH signature.
          git commit -S -s -m "chore: sync version references to v${TARGET_VERSION}"
          git push origin "${{ github.ref_name }}"
