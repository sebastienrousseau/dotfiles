name: Regression Trace Audit

# Weekly check that every `# Regression for: GH-NNN` reference in
# tests/regression/*.sh still resolves to a real GitHub issue. Per #868
# this catches references to deleted issues, renumbered PRs, or stale
# pre-history markers that should have been updated.

on:
  schedule:
    - cron: '0 5 * * 1'  # Monday 05:00 UTC — runs after dependabot
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # so we can open a follow-up issue if drift is found

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Extract trace references
        id: scan
        run: |
          set -euo pipefail
          # Capture every "Regression for:" reference + the file it's in.
          grep -rEon '^# *Regression for: *(GH-[0-9]+|[0-9a-f]{7,40}|pre-history)' \
            tests/regression/ > references.txt
          echo "found $(wc -l < references.txt) trace headers"
          cat references.txt

      - name: Resolve GH-issue references
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            ref=$(echo "$line" | grep -oE 'GH-[0-9]+' || true)
            [[ -z "$ref" ]] && continue   # commit SHA or pre-history — skip
            num="${ref#GH-}"
            if ! gh issue view "$num" --json number --jq '.number' >/dev/null 2>&1; then
              echo "::warning::Trace ref $ref does not resolve to a real issue (in $line)"
              missing=$((missing + 1))
            fi
          done < references.txt

          if [[ $missing -gt 0 ]]; then
            echo "::error::$missing trace reference(s) failed to resolve"
            exit 1
          fi
          echo "All GH-* trace references resolve to live issues."

      - name: Open tracking issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Regression trace audit: drift detected ($(date -u +%Y-%m-%d))"
          body=$(cat <<'EOF'
          The weekly regression-trace audit found broken `# Regression for: GH-NNN` references.

          See the failing workflow run for details. Fix by either:

          * updating the reference to a current issue, or
          * changing to `pre-history` if the original context is irretrievable.

          Tracked under #868.
          EOF
          )

          # Reuse an existing open issue with the same title prefix if there is one.
          existing=$(gh issue list \
            --search 'Regression trace audit: drift detected' \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label "type:testing,priority:medium"
          fi
