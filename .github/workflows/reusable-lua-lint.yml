name: Reusable Lua Lint

on:
  workflow_call:
    inputs:
      target:
        description: Directory to lint (luacheck + stylua).
        required: false
        default: defaults/dot_config/nvim
        type: string
      strict:
        description: Enforce zero-warning policy (--codes --ranges).
        required: false
        default: true
        type: boolean
      stylua_version:
        # Keep in sync with `config/pre-commit-config.yaml` (#865).
        description: Pinned stylua version.
        required: false
        default: "2.4.1"
        type: string
      luacheck_version:
        # Keep in sync with `config/pre-commit-config.yaml` (#865).
        description: Pinned luacheck version.
        required: false
        default: "1.2.0"
        type: string
      run_functional:
        description: Boot headless Neovim and run the functional load test.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  lua-lint:
    name: Lua Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Lua tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.luarocks
            ~/.cargo/bin/stylua
          key: lua-lint-${{ runner.os }}-stylua-${{ inputs.stylua_version }}

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y lua5.1 luarocks
          luarocks install --local luacheck "${{ inputs.luacheck_version }}"
          echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"
          if [[ ! -x "$HOME/.cargo/bin/stylua" ]]; then
            cargo install stylua --version "${{ inputs.stylua_version }}"
          fi

      - name: Luacheck
        run: |
          set -euo pipefail
          echo "::notice::Running luacheck on ${{ inputs.target }}"
          if [[ "${{ inputs.strict }}" == "true" ]]; then
            luacheck --no-color --codes --ranges "${{ inputs.target }}"
          else
            luacheck --formatter plain --codes "${{ inputs.target }}"
          fi

      - name: Stylua (format check)
        run: |
          set -euo pipefail
          echo "::notice::Checking stylua formatting on ${{ inputs.target }}"
          "$HOME/.cargo/bin/stylua" --check --color Never "${{ inputs.target }}"

      # Functional gate: boot a real headless Neovim and require every config
      # module + plugin spec, catching runtime faults static linting misses.
      - name: Setup Neovim
        if: ${{ inputs.run_functional }}
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1
        with:
          neovim: true

      - name: Neovim functional load test
        if: ${{ inputs.run_functional }}
        run: |
          set -euo pipefail
          nvim --version | head -1
          out="$(bash tests/unit/nvim/test_nvim_functional_load.sh)"
          printf '%s\n' "$out"
          failed="$(printf '%s\n' "$out" | grep -oE 'RESULTS:[0-9]+:[0-9]+:[0-9]+$' | tail -1 | cut -d: -f4)"
          if [[ "${failed:-1}" != "0" ]]; then
            echo "::error::Neovim functional load test reported ${failed:-?} failure(s)"
            exit 1
          fi
          echo "::notice::Neovim functional load test passed"
