name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty for package.json version)'
        required: false
        type: string

# Least-privilege top-level — write scopes are granted on jobs
# that actually need them. Scorecard's Token-Permissions check
# requires an explicit `permissions:` block at top-level.
permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node.js
        # Node 24 LTS bundles npm >= 11, which is the minimum
        # OIDC Trusted Publishing requires. With this we no longer
        # need a follow-up `npm install -g npm@…` step; removing
        # that step also closes the matching Scorecard
        # `Pinned-Dependencies` finding on this workflow.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package.json
        run: |
          if [[ ! -f package.json ]]; then
            echo "Error: package.json not found"
            exit 1
          fi
          cat package.json

      # Trusted Publishing (OIDC). The GitHub Actions OIDC token is
      # exchanged with npmjs.com for a short-lived publish credential;
      # provenance is attached automatically and cryptographically tied
      # to this workflow run. No NPM_TOKEN required.
      #
      # Configured on npmjs.com:
      #   Package "@sebastienrousseau/dotfiles" -> Settings ->
      #   Trusted publishing -> Publisher = GitHub Actions,
      #   Repository = sebastienrousseau/dotfiles,
      #   Workflow = .github/workflows/npm-publish.yml.
      - name: Publish to npm
        run: npm publish --access public --provenance

  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node.js for GPR
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Match the publish-npm job's Node 24; keeps both pipelines
          # on the same npm major and avoids surprise behavioural diffs
          # between npm 10 and npm 11.
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@sebastienrousseau'

      # Skip cleanly if this version is already on GPR (avoids 409 on
      # workflow re-dispatches against an already-published release).
      # Note: `npm view <pkg>@<ver> version` exits 0 with empty stdout
      # when the version doesn't exist, so we check stdout, not rc.
      - name: Check if version already exists on GPR
        id: gpr_check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p 'require("./package.json").version')
          existing=$(npm view "@sebastienrousseau/dotfiles@${version}" version --registry=https://npm.pkg.github.com 2>/dev/null || true)
          if [[ -n "$existing" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${version} already on GPR; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        if: steps.gpr_check.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
