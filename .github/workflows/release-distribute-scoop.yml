name: Release / Distribute Scoop

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v0.2.503)"
        required: false
        type: string

# Least-privilege top-level. The distribute-scoop job pushes
# branches and opens PRs; its `contents:write` + `pull-requests:write`
# are scoped to the job rather than granted workflow-wide.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribute-scoop:
    name: Distribute Scoop Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write           # push bump branch to scoop-bucket
      pull-requests: write      # open PR to scoop-bucket
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout dotfiles
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure signed commits
        env:
          ACTIONS_BOT_SIGNING_KEY: ${{ secrets.ACTIONS_BOT_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${ACTIONS_BOT_SIGNING_KEY}" ]]; then
            echo "::error::Missing ACTIONS_BOT_SIGNING_KEY secret"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "${ACTIONS_BOT_SIGNING_KEY}" > ~/.ssh/actions_bot_signing_key
          chmod 600 ~/.ssh/actions_bot_signing_key
          git config --local gpg.format ssh
          git config --local user.signingkey ~/.ssh/actions_bot_signing_key
          git config --local commit.gpgsign true

      - name: Resolve release tag
        id: resolve-tag
        run: |
          set -euo pipefail
          # Use release tag from event or workflow_dispatch input
          TAG="${{ github.event.release.tag_name || inputs.release_tag }}"
          if [[ -z "$TAG" ]]; then
            echo "::error::No release tag provided"
            exit 1
          fi
          # Remove leading 'v' for VERSION
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download release asset
        id: download-asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          VERSION="${{ steps.resolve-tag.outputs.version }}"
          ASSET_NAME="dot-${VERSION}.zip"
          echo "Downloading ${ASSET_NAME} from release ${TAG}..."
          mkdir -p assets
          # The packaging workflow (release-package-dot.yml) uploads this asset
          # in parallel on the same `release: published` event, so it may not be
          # present yet when this job starts (the race that failed first-run
          # distribution on v0.2.504/v0.2.505). Poll for it (~5 min) before failing.
          ASSET_PATH=""
          for attempt in $(seq 1 20); do
            gh release download "$TAG" --dir assets --pattern "${ASSET_NAME}" --clobber 2>/dev/null || true
            ASSET_PATH="$(find assets -name "${ASSET_NAME}" -type f | head -1)"
            [[ -n "$ASSET_PATH" ]] && break
            echo "Asset ${ASSET_NAME} not ready (attempt ${attempt}/20); waiting 15s..."
            sleep 15
          done
          if [[ -z "$ASSET_PATH" ]]; then
            echo "::error::Asset ${ASSET_NAME} not found in release ${TAG} after ~5min"
            exit 1
          fi
          echo "asset_path=${ASSET_PATH}" >> $GITHUB_OUTPUT

      - name: Compute SHA256 of zip
        id: compute-sha256
        run: |
          set -euo pipefail
          ASSET_PATH="${{ steps.download-asset.outputs.asset_path }}"
          SHA256=$(sha256sum "$ASSET_PATH" | awk '{print $1}')
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          echo "SHA256: ${SHA256}"

      - name: Update Scoop manifest
        id: update-manifest
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve-tag.outputs.version }}"
          SHA256="${{ steps.compute-sha256.outputs.sha256 }}"
          TAG="${{ steps.resolve-tag.outputs.tag }}"

          # Read the template manifest
          TEMPLATE_PATH="install/scoop/dot.json"
          if [[ ! -f "$TEMPLATE_PATH" ]]; then
            echo "::error::Template manifest not found at ${TEMPLATE_PATH}"
            exit 1
          fi

          URL="https://github.com/sebastienrousseau/dotfiles/releases/download/${TAG}/dot-${VERSION}.zip"

          # Update the manifest using jq. The release zip extracts as
          # dot-VERSION/... so extract_dir must also follow the version
          # bump — otherwise scoop installs from a nonexistent
          # subdirectory on the next release.
          jq \
            --arg ver "$VERSION" \
            --arg url "$URL" \
            --arg sha "$SHA256" \
            --arg extract "dot-$VERSION" \
            '.version = $ver |
            .architecture["64bit"].url = $url |
            .architecture["64bit"].hash = ("sha256:" + $sha) |
            .architecture["64bit"].extract_dir = $extract |
            .architecture["arm64"].url = $url |
            .architecture["arm64"].hash = ("sha256:" + $sha) |
            .architecture["arm64"].extract_dir = $extract' \
            "$TEMPLATE_PATH" > dot.json

          # Defence in depth: the template carries a PLACEHOLDER hash
          # for first-publish; bail if jq didn't substitute it.
          if grep -qiE "placeholder" dot.json; then
            echo "::error::Manifest still contains a PLACEHOLDER token after rewrite:"
            grep -nEi placeholder dot.json
            exit 1
          fi

          echo "Updated manifest:"
          cat dot.json
          echo "manifest_path=$(pwd)/dot.json" >> $GITHUB_OUTPUT

      - name: Clone scoop-bucket repository
        id: clone-bucket
        run: |
          set -euo pipefail
          BUCKET_REPO="sebastienrousseau/scoop-bucket"
          git clone "https://${{ secrets.TAP_PUSH_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${BUCKET_REPO}.git" scoop-bucket
          # Detect the default branch (main vs master) so the PR targets
          # the right base regardless of how the bucket is initialised.
          cd scoop-bucket
          default_branch=$(git symbolic-ref --short HEAD)
          echo "default_branch=${default_branch}" >> "$GITHUB_OUTPUT"
          echo "Bucket default branch: ${default_branch}"

      - name: Prepare bump branch and update manifest in bucket
        id: prepare-bump
        env:
          ACTIONS_BOT_SIGNING_KEY: ${{ secrets.ACTIONS_BOT_SIGNING_KEY }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve-tag.outputs.version }}"
          BRANCH_NAME="bump/dot-${VERSION}"
          MANIFEST_PATH="${{ steps.update-manifest.outputs.manifest_path }}"

          cd scoop-bucket

          # Configure git for the bucket repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local gpg.format ssh
          git config --local user.signingkey ~/.ssh/actions_bot_signing_key
          git config --local commit.gpgsign true

          # Create or reset the bump branch. `-B` is idempotent for re-runs
          # against the same release tag (the previous attempt's branch
          # would otherwise block `-b`).
          git checkout -B "$BRANCH_NAME"

          # Copy the updated manifest into place
          mkdir -p bucket
          cp "$MANIFEST_PATH" bucket/dot.json

          # Commit the change
          git add bucket/dot.json
          git commit -S -m "dot ${VERSION}

          Update Scoop manifest for dotfiles CLI release ${VERSION}."

          # Force-with-lease so a stale prior bump branch is overwritten
          # safely without clobbering unrelated commits.
          git push --force-with-lease origin "$BRANCH_NAME"

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Open Pull Request to scoop-bucket
        env:
          GH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve-tag.outputs.version }}"
          BRANCH_NAME="${{ steps.prepare-bump.outputs.branch_name }}"
          BASE_BRANCH="${{ steps.clone-bucket.outputs.default_branch }}"
          cd scoop-bucket

          # If a PR for this branch already exists (re-run), comment a refresh
          # note instead of failing on duplicate.
          existing=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [[ -n "$existing" ]]; then
            gh pr comment "$existing" --body "Re-pushed by Release / Distribute Scoop for dot ${VERSION}."
            exit 0
          fi

          gh pr create \
            --title "dot ${VERSION}" \
            --body "Automated update of the \`dot\` Scoop manifest for release ${VERSION}.

          Changes:
          - Updated download URL to release tag
          - Updated SHA256 checksum of the zip archive

          Verification:
          - [ ] Manifest installs successfully with \`scoop install https://raw.githubusercontent.com/sebastienrousseau/scoop-bucket/${BASE_BRANCH}/bucket/dot.json\`
          - [ ] \`dot version\` reports correct version
          - [ ] CI passes

          Generated by .github/workflows/release-distribute-scoop.yml." \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME"
