name: PR Signature Check

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-signature:
    name: Verify PR description signature
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body for required signature
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          SIGNATURE_LINE_1="THE ARCHITECT ᛫ Sebastien Rousseau ᛫ https://sebastienrousseau.com"
          SIGNATURE_LINE_2="THE ENGINE ᛞ EUXIS ᛫ Enterprise Unified Execution Intelligence System ᛫ https://euxis.co"

          if printf '%s' "$PR_BODY" | grep -qF "$SIGNATURE_LINE_1" && \
             printf '%s' "$PR_BODY" | grep -qF "$SIGNATURE_LINE_2"; then
            echo "✓ PR signature verified"
          else
            echo "::error::PR description must end with the required Euxis signature."
            echo ""
            echo "Required signature (append to PR body):"
            echo "---"
            echo "$SIGNATURE_LINE_1"
            echo "$SIGNATURE_LINE_2"
            exit 1
          fi
