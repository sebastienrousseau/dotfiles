name: Reusable Secrets Scan

on:
  workflow_call:
    inputs:
      run_guard:
        description: Run gitleaks checkout guard script.
        required: false
        default: true
        type: boolean
      run_additional_patterns:
        description: Run additional shell/config secret pattern checks.
        required: false
        default: false
        type: boolean
    secrets:
      gh_token:
        required: false

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Gitleaks action may scan commit ranges on PR events; full history prevents
          # ambiguous revision errors in shallow checkouts.
          fetch-depth: 0
          fetch-tags: false

      - name: Guard gitleaks history mode
        if: inputs.run_guard == true
        run: bash tools/ci/guard-gitleaks-checkout.sh

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.gh_token || github.token }}
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Additional secret patterns
        if: inputs.run_additional_patterns == true
        run: |
          echo "Running additional security patterns scan..."
          rg -i "api[_-]?key|secret|password|token" --type sh || true
          ! rg -i "(password|secret|key)\s*[:=]\s*['\"][^'\"]{8,}" defaults/dot_config/ || {
            echo "Potential hardcoded credentials found in config files"
            exit 1
          }
          echo "Additional security scan completed"
