name: Dot CLI Cold-Start Bench

# Runs the dot CLI cold-start gate on every PR and push to master.
# Complements the weekly perf-baseline (shell-startup) workflow — this
# one is fast (<30s) and specifically targets the `dot` dispatcher
# cold-start, which is the user-visible cost of every `dot` invocation.
#
# Budget: 150ms median-of-11 on Linux, 200ms on macOS, 300ms on Windows.
# Per-OS budgets reflect runner-cost differences (Windows tools are
# slowest, Linux tools are fastest). Local macOS bash 5.x hits ~47ms
# so this leaves comfortable headroom while still catching regressions.
# Ratchet each budget down as improvements land (track in ROADMAP §C5).

on:
  push:
    branches: [master]
    paths:
      - 'bin/dot'
      - 'scripts/dot/**'
      - 'tools/ci/dot-cli-startup-bench.sh'
      - '.github/workflows/dot-cli-bench.yml'
  pull_request:
    paths:
      - 'bin/dot'
      - 'scripts/dot/**'
      - 'tools/ci/dot-cli-startup-bench.sh'
      - '.github/workflows/dot-cli-bench.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: dot CLI / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            budget_ms: 150
          - os: macos-latest
            budget_ms: 200
    timeout-minutes: 5
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Run cold-start gate
        env:
          DOT_BENCH_BUDGET_MS: ${{ matrix.budget_ms }}
          DOT_BENCH_RUNS: 11
          DOT_BENCH_CMD: version
        run: bash tools/ci/dot-cli-startup-bench.sh
