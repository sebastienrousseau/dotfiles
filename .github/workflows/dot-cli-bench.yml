name: Dot CLI Cold-Start Bench

# Runs the dot CLI cold-start gate on every PR and push to master.
# Complements the weekly perf-baseline (shell-startup) workflow — this
# one is fast (<30s) and specifically targets the `dot` dispatcher
# cold-start, which is the user-visible cost of every `dot` invocation.
#
# Budget: 250ms median-of-11 on ubuntu-latest. Currently observed at
# ~47ms locally on macOS bash 5.x; CI runners are slower so the budget
# is loose. Ratchet down as improvements land.

on:
  push:
    branches: [master]
    paths:
      - 'dot_local/bin/executable_dot'
      - 'scripts/dot/**'
      - 'scripts/ci/dot-cli-startup-bench.sh'
      - '.github/workflows/dot-cli-bench.yml'
  pull_request:
    paths:
      - 'dot_local/bin/executable_dot'
      - 'scripts/dot/**'
      - 'scripts/ci/dot-cli-startup-bench.sh'
      - '.github/workflows/dot-cli-bench.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: dot CLI / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 5
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run cold-start gate
        env:
          DOT_BENCH_BUDGET_MS: 250
          DOT_BENCH_RUNS: 11
          DOT_BENCH_CMD: version
        run: bash scripts/ci/dot-cli-startup-bench.sh
