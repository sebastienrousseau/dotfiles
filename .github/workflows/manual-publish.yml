name: Manual Publish

on:
  push:
    branches: [main]
    paths:
      - 'docs/manual/**'
      - 'tools/docs/**'
      - '.github/workflows/manual-publish.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/manual/**'
      - 'tools/docs/**'
      - '.github/workflows/manual-publish.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  # Pages deploys moved to pages.yml. This workflow only builds the
  # multi-format manual + attaches it to releases (the `attach-release`
  # job adds its own `contents: write` permission locally).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # VALIDATE — fast (pandoc only, no TeX). Runs on every push/PR so broken
  # manual sources fail quickly without pulling the ~1GB TeX Live stack.
  # ==========================================================================
  validate:
    name: Validate Manual (fast — pandoc only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc codespell

      - name: Run manual quality gates
        run: bash tools/docs/check-manual.sh

      - name: Fast build (no PDF)
        run: bash tools/docs/build-manual.sh --fast

  # ==========================================================================
  # BUILD — full (pandoc + TeX Live). Only when we actually publish the site
  # or attach to a release. Skipped on PRs to avoid the TeX Live download cost.
  # ==========================================================================
  build:
    name: Build Manual (9 formats)
    needs: validate
    if: >-
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      html_size: ${{ steps.sizes.outputs.html_size }}
      pdf_size: ${{ steps.sizes.outputs.pdf_size }}
      epub_size: ${{ steps.sizes.outputs.epub_size }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Cache the apt archives directory so the ~1GB TeX Live download
      # is reused across runs. Key is tied to the workflow file so that
      # package changes invalidate the cache cleanly.
      - name: Cache apt archives
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives
          key: manual-apt-${{ runner.os }}-${{ hashFiles('.github/workflows/manual-publish.yml') }}
          restore-keys: |
            manual-apt-${{ runner.os }}-

      - name: Install pandoc + TeX Live (for PDF)
        run: |
          sudo apt-get update
          # Retain downloaded .debs so the cache above stays populated.
          sudo rm -f /etc/apt/apt.conf.d/docker-clean
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' | sudo tee /etc/apt/apt.conf.d/01keep-debs >/dev/null
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            lmodern \
            librsvg2-bin \
            codespell

      - name: Build manual (all formats)
        run: bash tools/docs/build-manual.sh

      - name: Record file sizes
        id: sizes
        run: |
          size() { stat -c%s "$1" 2>/dev/null || echo 0; }
          human() { awk -v b="$1" 'BEGIN{if(b<1024)print b"B";else if(b<1048576)printf "%dK",b/1024;else printf "%dM",b/1048576}'; }
          {
            echo "html_size=$(human "$(size _build/manual/dotfiles.html)")"
            echo "pdf_size=$(human "$(size _build/manual/dotfiles.pdf)")"
            echo "epub_size=$(human "$(size _build/manual/dotfiles.epub)")"
          } >> "$GITHUB_OUTPUT"

      - name: Upload manual artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manual
          path: _build/manual/
          retention-days: 90

  attach-release:
    name: Attach to Release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: manual
          path: _build/manual/

      - name: Upload to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            _build/manual/dotfiles.pdf
            _build/manual/dotfiles.epub
            _build/manual/dotfiles.html.gz
            _build/manual/html.tar.gz
            _build/manual/dotfiles.txt.gz
            _build/manual/dotfiles-md.tar.gz
            _build/manual/SHA256SUMS
          fail_on_unmatched_files: false
