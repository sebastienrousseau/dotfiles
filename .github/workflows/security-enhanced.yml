name: Enhanced Security Pipeline

on:
  push:
    branches: [master, main]
    # Only run security scans when security-relevant files change
    paths:
      - '**.sh'
      - '**.tmpl'
      - 'install/**'
      - 'scripts/security/**'
      - '.github/workflows/security*.yml'
      - '**/Dockerfile*'
      - 'config/gitleaks.toml'
      - '.github/security-policies/**'
  pull_request:
    branches: [master, main]
    paths:
      - '**.sh'
      - '**.tmpl'
      - 'install/**'
      - 'scripts/security/**'
      - '.github/workflows/security*.yml'
      - '**/Dockerfile*'
      - 'config/gitleaks.toml'
      - '.github/security-policies/**'
  merge_group:
    branches: [master, main]
    paths:
      - '**.sh'
      - '**.tmpl'
      - 'install/**'
      - 'scripts/security/**'
      - '.github/workflows/security*.yml'
      - '**/Dockerfile*'
      - 'config/gitleaks.toml'
      - '.github/security-policies/**'
  schedule:
    # Weekly security scan on Sunday 2 AM UTC (reduced from daily)
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Security scanning tool versions
  TRIVY_VERSION: "0.68.2"
  COSIGN_VERSION: "2.2.3"
  GRYPE_VERSION: "0.104.3"

jobs:
  # ============================================================================
  # STAGE 1: SECRETS & CREDENTIAL SCANNING (Always runs - critical)
  # ============================================================================

  secrets-scan:
    name: Security / Secrets Detection
    uses: ./.github/workflows/reusable-secrets-scan.yml
    with:
      run_guard: true
      run_additional_patterns: false
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  secrets-trufflehog:
    name: Security / TruffleHog OSS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [secrets-scan]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@6bd2d14f7a4bc1e569fa3550efa7ec632a4fa67b # v3.94.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  # ============================================================================
  # STAGE 2: DEPENDENCY VULNERABILITY SCANNING (Schedule/manual only - expensive)
  # ============================================================================

  dependency-scan:
    name: Security / Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Grype DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/grype
          key: grype-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: grype-db-${{ runner.os }}-

      - name: Scan for vulnerabilities with Grype
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -v "$HOME/.cache/grype:/grype-cache" \
            -w /work \
            "anchore/grype:v${{ env.GRYPE_VERSION }}" \
            dir:/work --output sarif --file /work/grype-results.sarif --fail-on critical

      - name: Upload Grype results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: grype-results.sarif
          category: grype-analysis

  # ============================================================================
  # STAGE 3: INFRASTRUCTURE SECURITY SCANNING (Schedule/manual only)
  # ============================================================================

  infrastructure-scan:
    name: Security / Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@0ce65fae06c148e349f955c3c35ad049c11e838c # v12.3092.0
        with:
          output_format: sarif
          output_file_path: checkov-results.sarif
          framework: dockerfile,yaml,secrets
          quiet: true
          soft_fail: true

      - name: Upload Checkov results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: checkov-results.sarif
          category: checkov-analysis

  # ============================================================================
  # STAGE 4: CONTAINER SECURITY SCANNING (Manual/tagged only)
  # ============================================================================

  container-scan:
    name: Security / Container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run container scans manually or with explicit tag
    if: contains(github.event.head_commit.message, '[container]') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build test container
        if: hashFiles('**/Dockerfile*') != ''
        run: docker build -f Dockerfile.test -t dotfiles-test:latest .

      - name: Scan container with Trivy
        if: hashFiles('**/Dockerfile*') != ''
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -w /work \
            "aquasec/trivy:${{ env.TRIVY_VERSION }}" \
            image --security-checks vuln,config,secret --format sarif --output /work/container-scan.sarif dotfiles-test:latest

      - name: Upload container scan results
        if: always() && hashFiles('**/Dockerfile*') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: container-scan.sarif
          category: container-analysis

  # ============================================================================
  # STAGE 5: POLICY ENFORCEMENT (PRs only)
  # ============================================================================

  policy-enforcement:
    name: Security / Policy Enforcement
    uses: ./.github/workflows/reusable-security-baseline.yml
    needs: [secrets-scan]
    # Only run on PRs to catch issues before merge
    if: github.event_name == 'pull_request'
    with:
      run_dependency_audit: false
      run_supply_chain_checks: false
      run_permission_audit: true

  # ============================================================================
  # STAGE 6: SECURITY ATTESTATION (main branch only, schedule)
  # ============================================================================

  security-attestation:
    name: Security / Attestation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [secrets-scan]
    # Only generate attestations on schedule for main branch
    if: github.event_name == 'schedule' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate security attestation
        run: |
          cat > security-attestation.json <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "scans_completed": ["secrets"],
            "tools_used": ["gitleaks"],
            "security_controls": {
              "secrets_scanning": true,
              "sarif_upload": true
            }
          }
          EOF

      - name: Attest security scan
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: security-attestation.json

      - name: Upload security attestation
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-attestation-${{ github.sha }}
          path: security-attestation.json
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs:
      - secrets-scan
      - dependency-scan
      - infrastructure-scan
      - policy-enforcement
    if: always()
    steps:
      - name: Security summary
        run: |
          for result in \
            "${{ needs.secrets-scan.result }}" \
            "${{ needs.dependency-scan.result }}" \
            "${{ needs.infrastructure-scan.result }}" \
            "${{ needs.policy-enforcement.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Security workflow contains a failing mandatory job"
              exit 1
            fi
          done
          echo "Security workflow passed"
