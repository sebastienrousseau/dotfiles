name: CI

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
    # Path filters: Only run when relevant files change
    paths:
      - '**.sh'
      - '**.tmpl'
      - 'defaults/.chezmoitemplates/**'
      - 'dot_*/**'
      - 'install/**'
      - 'scripts/**'
      - 'nix/**'
      - '.github/workflows/ci.yml'
      - '!**.md'
      - '!docs/**'
  pull_request:
    branches: [master]
    paths:
      - '**.sh'
      - '**.tmpl'
      - 'defaults/.chezmoitemplates/**'
      - 'dot_*/**'
      - 'install/**'
      - 'scripts/**'
      - 'nix/**'
      - '.github/workflows/ci.yml'
      - '!**.md'
      - '!docs/**'
  merge_group:
    branches: [master]
    # Note: merge_group does not support `paths` filters (GitHub Actions
    # limitation). Merge queue runs trigger the full CI graph; path filtering
    # happens downstream via the `changes` job's dorny/paths-filter step.
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday 6 AM UTC
  # Allow manual trigger for full CI
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CHEZMOI_VERSION: "2.47.1"

jobs:
  # ============================================================================
  # Path Change Detection
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      lua: ${{ steps.filter.outputs.lua }}
      nix: ${{ steps.filter.outputs.nix }}
      config: ${{ steps.filter.outputs.config }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            shell:
              - '**.sh'
              - 'install.sh'
              - 'defaults/.chezmoitemplates/**/*.sh'
              - 'scripts/**'
              - 'install/**'
            lua:
              - 'defaults/dot_config/nvim/**'
              - '**.lua'
            nix:
              - 'nix/**'
              - '**.nix'
            config:
              - 'dot_*/**'
            workflows:
              - '.github/workflows/**'
              - 'tools/ci/lint-reusable-pins.sh'
              - 'defaults/.chezmoitemplates/**'
              - '**.tmpl'
              - '**.toml'
              - 'defaults/.chezmoi*'

  # ============================================================================
  # STAGE 1: LINT (Fast, parallel checks)
  # ============================================================================
  lint-shell:
    name: Lint / Shell
    needs: changes
    if: needs.changes.outputs.shell == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: sebastienrousseau/dotfiles/.github/workflows/reusable-shell-lint.yml@510ff7b4cc3dfa477c8376f56c294128b59dcfa2 # master
    with:
      include_tests: false
      shellcheck_severity: error
      shellcheck_excludes: SC1091,SC2030,SC2031
      fail_on_shellcheck: true
      run_shfmt: true
      shfmt_targets: scripts/**/*.sh install.sh defaults/.chezmoitemplates/**/*.sh

  lint-lua:
    name: Lint / Lua
    needs: changes
    if: needs.changes.outputs.lua == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: sebastienrousseau/dotfiles/.github/workflows/reusable-lua-lint.yml@510ff7b4cc3dfa477c8376f56c294128b59dcfa2 # master
    with:
      target: defaults/dot_config/nvim
      strict: false
      stylua_version: "0.20.0"

  lint-fish:
    name: Lint / Fish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.config == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install fish
        run: sudo apt-get update && sudo apt-get install -y fish
      - name: Syntax Check
        run: |
          # -print0 | xargs -0 to handle non-alphanumeric filenames safely.
          find defaults/dot_config/fish \( -name '*.fish' -o -name '*.fish.tmpl' \) -print0 \
            | xargs -0 -I{} fish --no-execute {} \
            || echo "Template strings might cause issues in raw fish check, ignoring strict failure for tmpl"

  lint-nushell:
    name: Lint / Nushell
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.config == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Run Nu Check
        run: |
          nix shell nixpkgs#nushell -c nu -c "print 'Checking Nushell Syntax...'"
          # Template variables prevent true `nu --ide-check`, so we do a basic syntax check if possible.

  lint-copyright:
    name: Lint / Copyright
    needs: changes
    if: >-
      needs.changes.outputs.shell == 'true'
      || needs.changes.outputs.lua == 'true'
      || needs.changes.outputs.nix == 'true'
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    uses: sebastienrousseau/dotfiles/.github/workflows/reusable-copyright-lint.yml@510ff7b4cc3dfa477c8376f56c294128b59dcfa2 # master

  lint-reusable-pins:
    name: Lint / Reusable Workflow Pins
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    # Touches every workflow file, so any workflow change re-runs the lint.
    if: needs.changes.outputs.workflows == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify every reusable-workflow call site is SHA-pinned
        # Closes the lint-rule half of #855. Policy: docs/security/CI_PINNING.md
        run: bash tools/ci/lint-reusable-pins.sh

  lint-chezmoidata:
    name: Lint / Chezmoidata Schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.config == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Cache the compiled taplo-cli binary across runs so we only pay
      # the ~60s cargo build cost once. Key by major.minor so patch
      # bumps invalidate cleanly.
      - name: Cache taplo
        id: taplo_cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/taplo
          key: taplo-cli-0.10-${{ runner.os }}
      - name: Install taplo
        if: steps.taplo_cache.outputs.cache-hit != 'true'
        run: cargo install --locked taplo-cli --version "^0.10"
      - name: Verify taplo on PATH
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/taplo" --version
      - name: Validate defaults/.chezmoidata.toml against schema
        run: bash tools/ci/validate-chezmoidata.sh

  # ============================================================================
  # STAGE 2: SECURITY (Parallel with lint)
  # ============================================================================
  security-secrets:
    name: Security / Secrets Scan
    uses: sebastienrousseau/dotfiles/.github/workflows/reusable-secrets-scan.yml@510ff7b4cc3dfa477c8376f56c294128b59dcfa2 # master
    with:
      run_guard: true
      run_additional_patterns: true
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  security-dependencies:
    name: Security / Dependency Audit
    uses: sebastienrousseau/dotfiles/.github/workflows/reusable-security-baseline.yml@510ff7b4cc3dfa477c8376f56c294128b59dcfa2 # master
    with:
      run_dependency_audit: true
      run_supply_chain_checks: true
      run_permission_audit: false
      script_scan_root: scripts/

  security-trufflehog:
    name: Security / TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # v3.95.7
        with:
          extra_args: --only-verified

  security-sbom:
    name: Security / SBOM Generation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          # CI only needs artifact upload; release attachment is handled in
          # security-release.yml where permissions are elevated intentionally.
          upload-release-assets: false
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 30
      - name: Scan SBOM with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          sbom: sbom.cyclonedx.json
          fail-build: false
          severity-cutoff: critical

  security-links:
    name: Security / Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run link check on schedule or manual trigger (saves minutes)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lychee link checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --verbose --no-progress
            --exclude-path ./dot_config
            --exclude "localhost|127.0.0.1|example.com"
            --accept 200,204,301,302,403,429
            --max-retries 3 --timeout 30
            "**/*.md"
          fail: false

  # ============================================================================
  # STAGE 3: TEST (Optimized - Linux always, macOS on schedule/manual)
  # ============================================================================
  test-linux:
    name: Test / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Reduced from 15 to enforce efficiency
    needs: changes
    if: needs.changes.outputs.config == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Chezmoi
        uses: ./.github/actions/setup-chezmoi
      - name: Init & Dry Run
        run: |
          chezmoi init
          chezmoi apply --verbose --dry-run
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-test-linux
          path: ~/.local/share/chezmoi/.log
          retention-days: 5

  test-macos:
    name: Test / macOS
    runs-on: macos-latest
    timeout-minutes: 10  # Reduced from 15 to enforce efficiency
    needs: changes
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Chezmoi
        uses: ./.github/actions/setup-chezmoi
      - name: Init & Dry Run
        run: |
          chezmoi init
          chezmoi apply --verbose --dry-run
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-test-macos
          path: ~/.local/share/chezmoi/.log
          retention-days: 5

  test-windows:
    name: Test / Windows
    runs-on: windows-latest
    timeout-minutes: 10
    needs: changes
    # Windows runners cost ~10× Linux on GitHub-hosted infra; gate on
    # shell-or-windows changes only, not every push.
    if: needs.changes.outputs.shell == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify PowerShell 7.4+
        # windows-latest currently ships PowerShell 7.4 LTS (EOL 2026-11-10).
        # 7.5 is current stable. Our claim is "7.4+" — both qualify. We'll
        # bump to "7.5+" after the 7.4 LTS EOL, which is when the bundled
        # runner version is likely to roll forward anyway.
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion.Major -lt 7 -or
              ($PSVersionTable.PSVersion.Major -eq 7 -and $PSVersionTable.PSVersion.Minor -lt 4)) {
            Write-Error "PowerShell $($PSVersionTable.PSVersion) — need 7.4+ (LTS) or 7.5+"
            exit 1
          }
          Write-Host "PowerShell $($PSVersionTable.PSVersion) ✓"

      - name: Install chezmoi (scoop)
        shell: pwsh
        run: |
          # scoop is preinstalled on windows-latest runners; double-check.
          if (-not (Get-Command scoop -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
            Invoke-Expression "& {$(Invoke-RestMethod get.scoop.sh)} -RunAsAdmin"
          }
          scoop install chezmoi
          chezmoi --version
          # Persist scoop shims on PATH for subsequent steps — each step
          # gets a fresh environment, so PATH mutations performed by
          # scoop's installer don't carry over.
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\scoop\shims"

      - name: Run smoke test
        shell: pwsh
        run: pwsh -NoProfile -File tools/ci/windows-smoke-test.ps1 -RepoRoot $env:GITHUB_WORKSPACE

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-test-windows
          path: ${{ github.workspace }}\.local\share\chezmoi\.log
          retention-days: 5

  test-docker:
    name: Test / Integration (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Increased — apt mirror congestion can take 7+ min
    needs: changes
    # Only run when install.sh, scripts, or test_install_e2e.sh change
    if: needs.changes.outputs.shell == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu]
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: E2E Installation Test
        run: |
          # Retry apt-get up to 3 times to handle transient mirror failures
          docker run --rm -v "${GITHUB_WORKSPACE}:/root/dotfiles-src" ${{ matrix.distro }}:latest bash -c "
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            for i in 1 2 3; do
              if apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates; then
                break
              fi
              echo \"apt attempt \$i failed, retrying...\"
              sleep 10
            done
            cd /root/dotfiles-src
            ./tests/integration/test_install_e2e.sh
          "

  test-unit:
    name: Test / Unit
    needs: changes
    uses: sebastienrousseau/dotfiles/.github/workflows/reusable-test-suite.yml@510ff7b4cc3dfa477c8376f56c294128b59dcfa2 # master
    with:
      min_coverage: "95"
      run_integration: true
      run_strict_checks: true
      timeout_minutes: 10

  # ============================================================================
  # STAGE 4: QUALITY (Depends on lint + test passing)
  # ============================================================================
  quality-idempotency:
    name: Quality / Idempotency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-shell, test-linux]
    # Only run on full CI (schedule/manual) - idempotency is expensive
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Chezmoi
        uses: ./.github/actions/setup-chezmoi
      - name: Configure source dir
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          echo "sourceDir = \"$GITHUB_WORKSPACE\"" > "$HOME/.config/chezmoi/chezmoi.toml"
      - name: First apply
        run: chezmoi apply --exclude=scripts --verbose
      - name: Second apply (must be no-op)
        run: |
          OUTPUT=$(chezmoi apply --exclude=scripts --verbose 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -E "^(create|modify|remove)" | grep -v ".DS_Store"; then
            echo "::error::Not idempotent - second apply made changes"
            exit 1
          fi

  quality-nix:
    name: Quality / Nix
    needs: [changes]
    if: needs.changes.outputs.nix == 'true' || needs.changes.outputs.config == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    # reusable-nix-lint.yml requests id-token: write for the Nix installer's
    # OIDC-backed cache. Top-level workflow permissions (contents: read) don't
    # cover that, so the caller job must grant it explicitly.
    permissions:
      contents: read
      id-token: write
    uses: sebastienrousseau/dotfiles/.github/workflows/reusable-nix-lint.yml@510ff7b4cc3dfa477c8376f56c294128b59dcfa2 # master
    with:
      flake_dir: nix
      run_fmt_check: false
      run_flake_check: true
      run_build: true

  # ============================================================================
  # STAGE 5: BENCHMARK (Only on schedule/manual - expensive)
  # ============================================================================
  benchmark:
    name: Benchmark / Linux
    runs-on: ubuntu-latest  # Linux only - cheaper than multi-OS
    timeout-minutes: 10
    needs: [test-linux]
    # Only run benchmarks on schedule or manual trigger
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh hyperfine jq

      - name: Setup Chezmoi
        uses: ./.github/actions/setup-chezmoi

      - name: Configure source dir
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          echo "sourceDir = \"$GITHUB_WORKSPACE\"" > "$HOME/.config/chezmoi/chezmoi.toml"

      - name: Apply dotfiles
        run: chezmoi apply --exclude=scripts

      - name: Performance benchmark
        run: |
          chmod +x tests/performance/*.sh 2>/dev/null || true
          ./tests/performance/benchmark_runner.sh 2>/dev/null || true

      - name: Shell startup benchmark with regression tracking
        id: benchmark
        run: |
          mkdir -p benchmark-results

          # Run hyperfine benchmark
          hyperfine --warmup 3 --runs 10 "zsh -i -c exit" \
            --export-json benchmark-results/shell-startup.json \
            --export-markdown benchmark-results/shell-startup.md

          # Extract metrics
          time_ms=$(jq '.results[0].mean * 1000 | floor' benchmark-results/shell-startup.json)
          time_min=$(jq '.results[0].min * 1000 | floor' benchmark-results/shell-startup.json)
          time_max=$(jq '.results[0].max * 1000 | floor' benchmark-results/shell-startup.json)
          time_stddev=$(jq '.results[0].stddev * 1000 | floor' benchmark-results/shell-startup.json)

          {
            echo "time_ms=$time_ms"
            echo "time_min=$time_min"
            echo "time_max=$time_max"
          } >> "$GITHUB_OUTPUT"

          # Create regression tracking record
          cat > benchmark-results/metrics.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "shell_startup": {
              "mean_ms": $time_ms,
              "min_ms": $time_min,
              "max_ms": $time_max,
              "stddev_ms": $time_stddev,
              "threshold_ms": 500,
              "passed": $([ "$time_ms" -le 500 ] && echo true || echo false)
            }
          }
          EOF

          {
            echo "### Shell Startup Performance"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Mean | ${time_ms}ms |"
            echo "| Min | ${time_min}ms |"
            echo "| Max | ${time_max}ms |"
            echo "| Std Dev | ${time_stddev}ms |"
            echo "| Threshold | 500ms |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$time_ms" -gt 500 ]]; then
            echo "::error::Shell startup ${time_ms}ms exceeds 500ms threshold — performance regression"
            echo "⚠️ **Performance regression detected**: ${time_ms}ms exceeds 500ms threshold" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **Performance OK**: ${time_ms}ms is within 500ms threshold" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Per-component startup budget
        run: |
          # Capture per-component timing using DOTFILES_DEBUG mode
          DOTFILES_DEBUG=1 zsh -i -c exit 2>benchmark-results/debug-timing.log || true

          {
            echo "### Per-Component Startup Budget"
            echo ""
            echo "| Component | Time |"
            echo "|-----------|------|"
          } >> "$GITHUB_STEP_SUMMARY"

          # Parse [debug Xms] lines and report
          if [[ -f benchmark-results/debug-timing.log ]]; then
            grep -oP '\[debug \K[0-9]+ms\] .*' benchmark-results/debug-timing.log | while IFS=']' read -r time component; do
              component="${component## }"
              echo "| $component | ${time} |" >> "$GITHUB_STEP_SUMMARY"
            done

            # Check if any single component exceeds 100ms budget
            MAX_COMPONENT_MS=100
            if grep -oP '\[debug \K[0-9]+' benchmark-results/debug-timing.log | while read -r ms; do
              if [[ "$ms" -gt "$MAX_COMPONENT_MS" ]]; then
                echo "::warning::Component exceeded ${MAX_COMPONENT_MS}ms budget: ${ms}ms"
                exit 1
              fi
            done; then
              {
                echo ""
                echo "All components within ${MAX_COMPONENT_MS}ms budget."
              } >> "$GITHUB_STEP_SUMMARY"
            else
              {
                echo ""
                echo "**Warning**: Some components exceed ${MAX_COMPONENT_MS}ms budget."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "| (no debug output captured) | — |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results/
          retention-days: 90

      - name: Comment on PR with benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const time_ms = '${{ steps.benchmark.outputs.time_ms }}';
            const threshold = 500;
            const status = parseInt(time_ms) <= threshold ? '✅' : '⚠️';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${status} Shell Performance Benchmark

              | Metric | Value |
              |--------|-------|
              | Startup Time | ${time_ms}ms |
              | Threshold | ${threshold}ms |
              | Status | ${parseInt(time_ms) <= threshold ? 'Passed' : 'Regression detected'} |

              <details>
              <summary>Benchmark Details</summary>

              - Min: ${{ steps.benchmark.outputs.time_min }}ms
              - Max: ${{ steps.benchmark.outputs.time_max }}ms
              - Commit: ${{ github.sha }}
              </details>`
            })

  # ============================================================================
  # STAGE 6: QUALITY GATES (Final validation before merge)
  # ============================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [lint-shell, lint-copyright, security-secrets, security-dependencies, test-unit]
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Enforce merge requirements
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "QUALITY GATE ENFORCEMENT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All required checks passed:"
          echo "  - Zero-warning linting"
          echo "  - Formatter compliance"
          echo "  - 100% test success rate"
          echo "  - Zero secrets detected"
          echo "  - Dependency audit clean"
          echo ""
          echo "Ready for merge - all quality gates satisfied"
