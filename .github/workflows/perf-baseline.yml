name: Perf Baseline

# Perf baseline + regression alert. Closes #863's CI half.
#
# Triggers:
#   - schedule (Sunday 03:00 UTC): full flow — measure, record, upload
#     new baseline artifact, open/comment regression issue.
#   - push (feat/**, paths-filtered): measure-only — emits ::warning::
#     on regression; does not touch baseline or issues.
#
# Per-push runs catch regressions at PR time; weekly cron is still the
# source of truth for the recorded baseline so PR churn can't quietly
# rewrite the reference.
#
# Flow:
#   1. Restore the previous baseline from the most recent successful run.
#   2. Apply the dotfiles + record current means via `dot perf --json`.
#   3. Compare; emit ::warning:: (push) or open/comment issue (cron).
#   4. Upload current measurement as the next baseline (cron only).

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 03:00 UTC — establishes the recorded baseline
  push:
    branches:
      - 'feat/**'        # Per-commit measurement for fast regression feedback
    paths:               # Skip pushes that can't affect shell startup time
      - '**.sh'
      - '**.zsh'
      - '**.bash'
      - '**.fish'
      - '**.tmpl'
      - 'defaults/.chezmoitemplates/**'
      - 'defaults/dot_config/shell/**'
      - 'defaults/dot_*'
      - 'scripts/diagnostics/perf.sh'
      - '.github/workflows/perf-baseline.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read       # restore previous baseline artifact
  issues: write       # open regression issues

# Shared with ci.yml — keep these in sync via scripts/version-sync.sh.
env:
  CHEZMOI_VERSION: "2.47.1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Perf / Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Chezmoi
        uses: ./.github/actions/setup-chezmoi

      - name: Install zsh + bash + fish
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zsh fish

      - name: Apply dotfiles
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/chezmoi"
          echo "sourceDir = \"$GITHUB_WORKSPACE\"" > "$HOME/.config/chezmoi/chezmoi.toml"
          chezmoi apply --exclude=scripts --keep-going || true

      - name: Restore previous baseline
        id: restore
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/dotfiles"

          # Pull the most recent baseline artifact from prior runs.
          gh run list \
            --workflow=perf-baseline.yml \
            --status=success \
            --limit=20 \
            --json databaseId,createdAt \
            > runs.json 2>/dev/null || echo '[]' > runs.json

          PREV_ID=$(jq -r '.[0].databaseId // empty' runs.json)
          if [ -n "$PREV_ID" ]; then
            gh run download "$PREV_ID" \
              --name perf-baseline \
              --dir "$HOME/.cache/dotfiles" 2>/dev/null \
              || echo "::notice::No previous baseline artifact — first run."
          fi

          if [ -s "$HOME/.cache/dotfiles/perf-baseline.json" ]; then
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
            echo "Previous baseline restored:"
            cat "$HOME/.cache/dotfiles/perf-baseline.json"
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Measure current perf
        id: measure
        run: |
          set -euo pipefail
          bash scripts/diagnostics/perf.sh --json > /tmp/perf-current.json
          echo "Current measurement:"
          cat /tmp/perf-current.json
          regression_count=$(jq -r '.regression_count // 0' /tmp/perf-current.json)
          echo "regression_count=$regression_count" >> "$GITHUB_OUTPUT"

      - name: Warn on regression (push events)
        if: github.event_name == 'push' && steps.measure.outputs.regression_count != '0'
        run: |
          echo "::warning::Perf regression detected on this push — see job log for details. Tracked weekly via cron; baseline not overwritten by push events."
          cat /tmp/perf-current.json

      - name: Open regression issue
        if: github.event_name != 'push' && steps.measure.outputs.regression_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Perf baseline regression detected ($(date -u +%Y-%m-%d))"
          body=$(cat <<EOF
          The weekly perf-baseline workflow reports regression(s) vs the last recorded baseline.

          \`\`\`json
          $(cat /tmp/perf-current.json)
          \`\`\`

          Triage:
          - Identify which commit since the last baseline introduced the regression.
          - Either revert / fix the cause, OR if the new baseline is intentional, run \`dot perf --baseline\` locally and commit the result, then dismiss this issue.

          See \`docs/operations/PERFORMANCE.md\` for the budget + lifecycle.

          Tracked under #863.
          EOF
          )

          existing=$(gh issue list \
            --search 'Perf baseline regression detected' \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "$title" \
              --body "$body" \
              --label "type:performance,priority:medium"
          fi

      - name: Record new baseline
        if: github.event_name != 'push'
        run: |
          set -euo pipefail
          # The workflow's own perf.sh writes the file in --baseline mode;
          # invoke it that way to keep the format stable. Push events
          # measure-only — baseline is only updated by the weekly cron
          # so per-PR drift doesn't quietly rewrite the reference.
          bash scripts/diagnostics/perf.sh --baseline >/dev/null 2>&1 || true
          cp "$HOME/.cache/dotfiles/perf-baseline.json" /tmp/perf-baseline.json

      - name: Upload new baseline artifact
        if: github.event_name != 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-baseline
          path: /tmp/perf-baseline.json
          retention-days: 90
