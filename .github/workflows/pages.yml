name: Pages

# Builds and deploys the docs/ site to GitHub Pages (custom domain:
# doc.dotfiles.io) with MkDocs Material. The repo's Pages settings have
# build_type=workflow, so this is the canonical deploy path — no
# Jekyll-on-source-branch fallback.
#
# Conflict note: manual-publish.yml builds the multi-format Manual
# (HTML/PDF/EPUB/...) and attaches it to releases. It used to also
# deploy `_build/manual/` to Pages, which races with this workflow.
# That deploy step has been removed in the same change that introduced
# this file; manual binaries are now downloadable only from releases.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress
# runs — Pages publishes are idempotent and we want each push handled.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site (MkDocs Material)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install MkDocs Material
        run: pip install --require-hashes -r requirements-docs.txt

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build with MkDocs
        # Emits the static site to ./site (docs_dir=docs, site_dir=site in
        # mkdocs.yml). CNAME is carried through via extra_files.
        run: mkdocs build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
