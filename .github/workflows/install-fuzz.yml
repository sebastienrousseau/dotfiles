name: Install Fuzz

# Weekly install.sh fuzz harness. Catches the regression class of
# "install.sh hangs on adversarial input" — the harness already
# uncovered two real bugs (`-h` alias missing, garbage positionals
# triggering network calls) and pinned the fix; this workflow runs it
# in CI so any future shape of the same bug class is caught early.
#
# Runs weekly on Monday 03:00 UTC + manual dispatch + every PR that
# touches install.sh. On schedule-only failure, opens (or comments
# on) a tracking issue.

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'install.sh'
      - 'tests/fuzz/**'
      - '.github/workflows/install-fuzz.yml'

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz / install.sh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install coreutils (for gtimeout on macOS)
        if: runner.os == 'macOS'
        run: brew install coreutils

      - name: Run install.sh fuzz harness
        run: bash tests/fuzz/fuzz_install.sh

      - name: Open tracking issue on schedule failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="install.sh fuzz regression on ${{ runner.os }} ($(date -u +%Y-%m-%d))"
          body=$(cat <<EOF
          The weekly install.sh fuzz harness failed on **${{ runner.os }}**.

          Re-run the failing job + check the per-fixture output to identify which adversarial input regressed.

          Tracked under #881.
          EOF
          )

          existing=$(gh issue list \
            --search 'install.sh fuzz regression' \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "$title" \
              --body "$body" \
              --label "type:testing,type:security,priority:medium"
          fi
