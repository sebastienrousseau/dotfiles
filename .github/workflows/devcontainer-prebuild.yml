name: Devcontainer Prebuild

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - '.github/workflows/devcontainer-prebuild.yml'
  pull_request:
    branches: [main]
    paths:
      # Only validate devcontainer changes; do not rebuild on workflow edits
      # to avoid 30-min apt downloads on unrelated PRs.
      - '.devcontainer/**'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

# Least-privilege top-level — `packages: write` is needed only by
# the build job (to push to ghcr.io). Scorecard's Token-Permissions
# check flags top-level write scopes.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Devcontainer Image
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Increased — apt mirror congestion can extend builds
    permissions:
      contents: read
      packages: write   # push image to ghcr.io
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Cache Docker layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/.buildx-cache
          key: devcontainer-buildx-${{ runner.os }}-${{ hashFiles('.devcontainer/**') }}
          restore-keys: |
            devcontainer-buildx-${{ runner.os }}-
            devcontainer-buildx-

      - name: Prepare CI devcontainer config
        run: cp .devcontainer/devcontainer.ci.json .devcontainer/devcontainer.json

      - name: Pre-build devcontainer image
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3
        with:
          # devcontainers/ci requires a standard filename for configFile.
          configFile: .devcontainer/devcontainer.json
          imageName: ghcr.io/${{ github.repository_owner }}/dotfiles-devcontainer
          cacheFrom: ghcr.io/${{ github.repository_owner }}/dotfiles-devcontainer
          push: filter
          refFilterForPush: refs/heads/main
          eventFilterForPush: push,workflow_dispatch,schedule
          runCmd: |
            zsh --version
            git --version
