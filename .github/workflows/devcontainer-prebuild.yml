name: Devcontainer Prebuild

on:
  push:
    branches: [master]
    paths:
      - '.devcontainer/**'
      - '.github/workflows/devcontainer-prebuild.yml'
  pull_request:
    branches: [master]
    paths:
      # Only validate devcontainer changes; do not rebuild on workflow edits
      # to avoid 30-min apt downloads on unrelated PRs.
      - '.devcontainer/**'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

# Least-privilege top-level — `packages: write` is needed only by
# the build job (to push to ghcr.io). Scorecard's Token-Permissions
# check flags top-level write scopes.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Devcontainer Image
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Increased — apt mirror congestion can extend builds
    permissions:
      contents: read
      packages: write   # push image to ghcr.io
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@9f4a8ea54ed9055d5f86c993e1f2ffa674f98344 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: devcontainer-buildx-${{ runner.os }}-${{ hashFiles('.devcontainer/**') }}
          restore-keys: |
            devcontainer-buildx-${{ runner.os }}-
            devcontainer-buildx-

      - name: Prepare CI devcontainer config
        run: cp .devcontainer/devcontainer.ci.json .devcontainer/devcontainer.json

      - name: Pre-build devcontainer image
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3
        with:
          # devcontainers/ci requires a standard filename for configFile.
          configFile: .devcontainer/devcontainer.json
          imageName: ghcr.io/${{ github.repository_owner }}/dotfiles-devcontainer
          cacheFrom: ghcr.io/${{ github.repository_owner }}/dotfiles-devcontainer
          push: filter
          refFilterForPush: refs/heads/master
          eventFilterForPush: push,workflow_dispatch,schedule
          runCmd: |
            zsh --version
            git --version
