repos:
  # Shell script linting and formatting
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["-x", "-e", "SC1091"]  # Exclude sourced file warnings in CI

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci"]

  # Security scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            \.github/security-policies/environment-template\.env|
            scripts/security/manage-secrets\.sh|
            \.env\.local
          )$

  # Infrastructure security
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.506
    hooks:
      - id: checkov
        stages: [pre-push]
        args: [
          "--framework", "dockerfile,yaml,secrets",
          "--quiet",
          "--compact"
        ]
        files: \.(yaml|yml|dockerfile)$

  # File validation and formatting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1024']  # Prevent files larger than 1MB
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
        exclude: \.pub$  # Allow public keys

  # Conventional commit message validation
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: ['--ignore', 'DL3008', '--ignore', 'DL3013', '--ignore', 'DL3018']

  # Spell-checking (typos-cli) — see typos.toml at repo root for allowlist.
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.1
    hooks:
      - id: typos

  # GitHub Actions workflow linting (actionlint).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        # 29 pre-existing shellcheck-in-script style hits are tracked under
        # #866's follow-up sweep; mute them at the hook level so this gate
        # surfaces only workflow-syntax + runner-label + event-mismatch.
        args: ['-shellcheck=']

  # YAML linting — see config/yamllint.yaml for the rule overrides.
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ['-c', 'config/yamllint.yaml']

  # Markdown linting — see config/markdownlint.jsonc + config/markdownlint-cli2.jsonc
  # for the rule overrides (post-v0.2.503 the configs live under config/).
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ['--config', 'config/markdownlint-cli2.jsonc']

  # Lua linting (luacheck) — pinned to match the version installed by
  # `.github/workflows/reusable-lua-lint.yml`. Reads config/luacheckrc.
  - repo: https://github.com/lunarmodules/luacheck
    rev: v1.2.0
    hooks:
      - id: luacheck
        args: ['--config', 'config/luacheckrc']
        files: \.lua$

  # Lua formatting (stylua) — pinned to match the version installed by
  # `.github/workflows/reusable-lua-lint.yml`. The `stylua-github` hook
  # variant downloads the release binary (no Rust toolchain needed).
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.4.1
    hooks:
      - id: stylua-github
        files: \.lua$
        args: ['--check']  # report drift; do not auto-format on commit

  # Custom security policy enforcement
  - repo: local
    hooks:
      - id: security-policy-enforcement
        name: Security Policy Enforcement
        entry: scripts/security/enforce-policies.sh
        language: script
        pass_filenames: false
        stages: [pre-push]  # Run on push, not every commit

      - id: environment-validation
        name: Environment Variable Validation
        entry: scripts/security/manage-secrets.sh
        args: ['validate']
        language: script
        pass_filenames: false
        files: \.env\.local$

      - id: insecure-tls-check
        name: Block Insecure TLS Patterns
        entry: scripts/ci/check-insecure-tls.sh
        language: script
        pass_filenames: false
        # Extracted from an inline one-liner under #866 — awk-based matcher
        # avoids the substring false-positive on `-keyring` etc.

      - id: dangerous-chmod-check
        name: Block Dangerous Permissions
        entry: scripts/ci/check-dangerous-chmod.sh
        language: script
        pass_filenames: false

      - id: shell-preamble-check
        name: Enforce set -euo pipefail (or set -eu for sh)
        entry: scripts/ci/check-shell-preamble.sh
        language: script
        types: [shell]
        # Sourced libraries opt out via a `# Sourced by` header or `# preamble:skip`
        # marker; known-sourced paths are skipped inside the script itself.

      - id: regression-traceability
        name: Enforce 'Regression for:' header on tests/regression/*.sh
        entry: scripts/ci/check-regression-traceability.sh
        language: script
        files: ^tests/regression/.*\.sh$
