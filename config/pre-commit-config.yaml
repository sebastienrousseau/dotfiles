repos:
  # Shell script linting and formatting
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["-x", "-e", "SC1091"]  # Exclude sourced file warnings in CI

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci"]

  # Security scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            \.github/security-policies/environment-template\.env|
            scripts/security/manage-secrets\.sh|
            \.env\.local
          )$

  # Infrastructure security
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.506
    hooks:
      - id: checkov
        args: [
          "--framework", "dockerfile,yaml,secrets",
          "--quiet",
          "--compact"
        ]
        files: \.(yaml|yml|dockerfile)$

  # File validation and formatting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1024']  # Prevent files larger than 1MB
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
        exclude: \.pub$  # Allow public keys

  # Conventional commit message validation
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: ['--ignore', 'DL3008', '--ignore', 'DL3013', '--ignore', 'DL3018']

  # Custom security policy enforcement
  - repo: local
    hooks:
      - id: security-policy-enforcement
        name: Security Policy Enforcement
        entry: scripts/security/enforce-policies.sh
        language: script
        pass_filenames: false
        stages: [pre-push]  # Run on push, not every commit

      - id: environment-validation
        name: Environment Variable Validation
        entry: scripts/security/manage-secrets.sh
        args: ['validate']
        language: script
        pass_filenames: false
        files: \.env\.local$

      - id: insecure-tls-check
        name: Block Insecure TLS Patterns
        entry: bash -c 'if grep -rn --include="*.sh" --include="*.bash" --include="*.zsh" -E "curl\s+[^|;]*(-k|--insecure)|wget\s+[^|;]*--no-check-certificate" . 2>/dev/null | grep -v "^Binary"; then echo "ERROR: Insecure TLS patterns found (curl -k or wget --no-check-certificate)"; exit 1; fi'
        language: system
        pass_filenames: false
        types: [shell]

      - id: dangerous-chmod-check
        name: Block Dangerous Permissions
        entry: bash -c 'if grep -rn --include="*.sh" -E "chmod\s+(-R\s+)?(777|666)" . 2>/dev/null | grep -v "^Binary" | grep -v "^#"; then echo "ERROR: Dangerous chmod patterns found (777 or 666)"; exit 1; fi'
        language: system
        pass_filenames: false
        types: [shell]
