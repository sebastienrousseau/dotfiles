# yamllint configuration
# https://yamllint.readthedocs.io/en/stable/configuration.html
#
# Tuned to this repo: GitHub Actions workflows routinely have long lines
# (curl pipes, JSON payloads inline, secret-context expressions), and
# chezmoi templates use `{{- ... -}}` whitespace-stripping markers that
# `document-start` requirements would conflict with.

extends: default

rules:
  # Action workflows + secrets baseline rules have unavoidable long lines.
  # 200 is generous but still rejects truly runaway formatting.
  line-length:
    max: 200
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true

  # `---` document-start is optional for non-multi-doc files. Most YAML
  # in this repo is single-doc.
  document-start: disable

  # Comments in workflows often start `# - name: ...` mid-block which the
  # default `comments-indentation` rule rejects. Relax it.
  comments-indentation: disable

  # Permit `comments` to start anywhere — we already enforce shellcheck
  # for content; this is a stylistic choice that creates noise.
  comments:
    require-starting-space: true
    min-spaces-from-content: 1

  # GitHub Actions matrix entries are normally written one-per-line which
  # yamllint flags by default. Allow.
  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
    check-keys: false

  # YAML files generated by tools (e.g., GitHub PR templates that mix
  # `[ ]` checkboxes) sometimes lack a trailing newline; warn don't error.
  new-line-at-end-of-file:
    level: warning

ignore: |
  # Test fixtures may intentionally contain invalid YAML.
  tests/regression/fixtures/**
  tests/unit/**/fixtures/**

  # Vendored / generated files.
  .secrets.baseline
  dot_config/nvim/lazy-lock.json
  **/*.lock
  **/*.lock.json
