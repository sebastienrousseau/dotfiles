# Paru configuration (managed by chezmoi)
#
# Include the system defaults, then apply user-specific overrides.
Include = /etc/paru.conf

[bin]
# AUR histories commonly contain unsigned commits. Keep strict Git signature
# verification for normal repositories, but disable it for paru's internal
# clone/update merges so AUR upgrades can proceed.
GitFlags = -c merge.verifySignatures=false
