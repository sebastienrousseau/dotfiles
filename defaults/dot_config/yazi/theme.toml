# Yazi Theme — Catppuccin Mocha
# ~/.config/yazi/theme.toml
# Aligned with the global dotfiles theme (catppuccin-mocha)

[manager]
cwd = { fg = "#cba6f7" }

# Hovered item
hovered = { fg = "#1e1e2e", bg = "#89b4fa" }
preview_hovered = { underline = true }

# Find matches
find_keyword = { fg = "#f9e2af", bold = true, italic = true, underline = true }
find_position = { fg = "#f5c2e7", bg = "reset", italic = true }

# Marker (selected items)
marker_copied = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut = { fg = "#f38ba8", bg = "#f38ba8" }
marker_selected = { fg = "#89b4fa", bg = "#89b4fa" }
marker_marked = { fg = "#f9e2af", bg = "#f9e2af" }

# Tabs
tab_active = { fg = "#1e1e2e", bg = "#cba6f7" }
tab_inactive = { fg = "#cdd6f4", bg = "#45475a" }
tab_width = 1

# Count (selection indicator)
count_copied = { fg = "#1e1e2e", bg = "#a6e3a1" }
count_cut = { fg = "#1e1e2e", bg = "#f38ba8" }
count_selected = { fg = "#1e1e2e", bg = "#89b4fa" }

# Border
border_symbol = "│"
border_style = { fg = "#585b70" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#45475a", bg = "#45475a" }

# Status bar modes
mode_normal = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
mode_select = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
mode_unset = { fg = "#1e1e2e", bg = "#f2cdcd", bold = true }

# Permissions
permissions_t = { fg = "#89b4fa" }
permissions_r = { fg = "#f9e2af" }
permissions_w = { fg = "#f38ba8" }
permissions_x = { fg = "#a6e3a1" }
permissions_s = { fg = "#585b70" }

[input]
border = { fg = "#89b4fa" }
title = {}
value = {}
selected = { reversed = true }

[select]
border = { fg = "#89b4fa" }
active = { fg = "#f5c2e7" }
inactive = {}

[tasks]
border = { fg = "#89b4fa" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#313244" }
cand = { fg = "#94e2d5" }
rest = { fg = "#9399b2" }
desc = { fg = "#f5c2e7" }
separator = "  "
separator_style = { fg = "#585b70" }

[help]
on = { fg = "#f5c2e7" }
run = { fg = "#94e2d5" }
desc = { fg = "#9399b2" }
hovered = { bg = "#313244", bold = true }
footer = { fg = "#313244", bg = "#cdd6f4" }

[filetype]
rules = [
    # Media
    { mime = "image/*", fg = "#94e2d5" },
    { mime = "video/*", fg = "#f9e2af" },
    { mime = "audio/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/zip", fg = "#f5c2e7" },
    { mime = "application/gzip", fg = "#f5c2e7" },
    { mime = "application/x-tar", fg = "#f5c2e7" },

    # Documents
    { mime = "application/pdf", fg = "#f38ba8" },
    { mime = "application/json", fg = "#f9e2af" },

    # Fallback
    { name = "*/", fg = "#89b4fa", bold = true },
]
