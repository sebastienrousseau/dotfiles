# Active profile - change this to switch configurations
dotfiles_version = "0.2.512"
profile = "laptop"

# Machine preset — set per-host in ~/.config/chezmoi/chezmoi.toml:
#   [data]
#   machine = "macbook-t2"
# See .chezmoidata/hardware.toml for available presets.
machine = ""

# Visual theme — must be a key in .chezmoidata/themes.toml. Templates
# that consult `.theme` (dot_gitconfig.tmpl, dot_config/alacritty/
# alacritty.toml.tmpl, etc.) crash with `no entry for key` when this
# names a theme that isn't defined. Those templates fall back to the
# synthetic `fallback-dark` theme (always present — re-emitted by
# rebuild-themes.sh, never wallpaper-derived) if `.theme` is unset or
# unknown, so an invalid value degrades gracefully rather than aborting.
theme = "bloom-light"

# Terminal settings
terminal_font_family = "JetBrainsMono Nerd Font"
terminal_font_size = 20
default_shell = "fish" # zsh, fish, or nu

# Git identity (should be set via chezmoi init prompts or local overrides)
name = ""
email = ""
signingkey = ""

# ============================================================================
# Feature Flags
# ============================================================================
[features]
# Shell hardening
alias_wrapper = false

# DMS (Dank Material Shell) — dot-theme-sync feeds accent colors to
# matugen for desktop chrome (niri borders, GTK). Terminal emulators
# use exact theme colors from .chezmoidata/themes.toml.
dms = true

# Terminal multiplexers
zellij = false

# Linux desktop / Wayland — override per-host in ~/.config/chezmoi/chezmoi.toml
linux_desktop = false
niri = false
waybar = false
fuzzel = false
mako = false
foot = false
kanshi = false
touch = false
t2 = false
surface = false

# ============================================================================
# Tool-specific configuration
# ============================================================================

[tools]
# Node.js version manager
node_manager = "mise"  # mise, fnm, or nvm

# ============================================================================
# Alias Buckets (per-machine toggle support)
# ============================================================================
#
# Override these in ~/.config/chezmoi/chezmoi.toml under [data.aliases.buckets]
# to enable/disable alias groups per host.
#
# Example:
# [data.aliases.buckets]
# system = false
# svn = false
[aliases.buckets]
system = true
svn = true

[aliases.policy]
# When true:
# - destructive aliases require explicit confirmation
# - chezmoi apply runs alias governance in strict mode first
strict_mode = false
