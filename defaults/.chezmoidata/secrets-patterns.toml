# Atuin history_filter patterns
# =============================================================================
# This file is consumed by `dot_config/atuin/config.toml.tmpl` to populate the
# `history_filter` array in the deployed `~/.config/atuin/config.toml`.
#
# Per-machine extension:
#   Override or extend in `~/.config/chezmoi/chezmoi.toml`:
#
#     [data.atuin.history_filter]
#     extra = [
#       "^my-secret-tool ",
#       "MY_PRIVATE_VAR=",
#     ]
#
#   Patterns in `extra` are appended to the defaults below.
#
# Pattern syntax: POSIX extended regex, matched against the start of the line
# unless the pattern is itself anchored differently.
# =============================================================================

[atuin.history_filter]

defaults = [
  # Generic env-var exports
  "^export (SECRET|TOKEN|PASSWORD|API_KEY|AWS_)",
  "^PASSWORD=",
  "^[A-Z_]+_TOKEN=",
  "^[A-Z_]+_KEY=",

  # Cloud provider auth (AWS / GCP / Azure / Kubernetes)
  "^(aws|gcloud|az|kubectl).*(configure|auth|login|-k |--kubeconfig)",

  # AI providers — explicit token / key surfaces
  "ANTHROPIC_API_KEY=",
  "OPENAI_API_KEY=",
  "AGY_API_KEY=",
  "MISTRAL_API_KEY=",

  # SaaS secrets that commonly land on the command line
  "STRIPE_(SECRET|API)_KEY=",
  "GITHUB_TOKEN=",
  "GH_TOKEN=",
  "NPM_TOKEN=",
  "CARGO_REGISTRY_TOKEN=",

  # Authorization headers
  "curl.*-H.*[Aa]uthorization",

  # Embedded creds in git URLs
  "git clone.*https://.*:.*@",

  # Secret managers
  "^vault ",
  "^op (read|inject|run)",
  "^chamber (read|write|exec)",

  # Key material
  "^ssh-keygen",
  "^ssh-add",
  "^gpg --(import|export-secret)",
  "^age (-d|--decrypt|-e --passphrase)",

  # Database connection strings with embedded creds
  "(postgres|mysql|mongodb|redis)://[^:]+:[^@]+@",
]

# Per-host extension slot — populate in ~/.config/chezmoi/chezmoi.toml under
# [data.atuin.history_filter] extra = [ ... ]. Kept empty by default so the
# template renders cleanly with chezmoi's strict missing-key behavior.
extra = []
