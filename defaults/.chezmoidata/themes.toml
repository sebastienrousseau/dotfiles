# ─────────────────────────────────────────────────────────────────────
# Synthetic fallback themes (NOT wallpaper-derived, NEVER user-selectable).
# Every theme template degrades to `fallback-dark` when `.theme` is unset or
# names a theme absent from this file — without these, a bad `.theme` crashed
# rendering with `nil data; no entry for key term`. rebuild-themes.sh always
# re-emits this pair, so a regeneration that drops any wallpaper theme can
