# Playback
SPACE cycle pause
q quit
Q quit-watch-later
> playlist-next
< playlist-prev

# Seeking
RIGHT seek 5
LEFT seek -5
UP seek 60
DOWN seek -60
Shift+RIGHT seek 1 exact
Shift+LEFT seek -1 exact

# Speed
[ add speed -0.25
] add speed 0.25
{ add speed -0.5
} add speed 0.5
BS set speed 1.0

# Volume
m cycle mute
WHEEL_UP add volume 2
WHEEL_DOWN add volume -2

# Zoom
Ctrl+WHEEL_UP add video-zoom 0.1
Ctrl+WHEEL_DOWN add video-zoom -0.1
Ctrl+0 set video-zoom 0; set video-pan-x 0; set video-pan-y 0

# Subtitles
v cycle sub-visibility
j cycle sub
J cycle sub down

# Screenshot
s screenshot
S screenshot video

# Rotation
r cycle-values video-rotate 90 180 270 0

# Crop / Aspect
A cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "-1"
