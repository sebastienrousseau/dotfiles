# Video
profile=gpu-hq
vo=gpu-next
hwdec=auto-safe
gpu-api=vulkan

# Window
autofit-larger=90%x90%
keep-open=yes
cursor-autohide=1000

# Audio
volume=80
volume-max=150
audio-pitch-correction=yes

# Subtitles
sub-auto=fuzzy
sub-font="Inter"
sub-font-size=36
sub-border-size=2

# Screenshots
screenshot-format=png
screenshot-directory=~/Pictures/Screenshots
screenshot-template="%F-%P"

# OSD
osd-font="Inter"
osd-font-size=28
osd-duration=2000

# Cache
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=150MiB

# Loop images and gifs
[extension.gif]
loop-file=inf
[extension.png]
loop-file=inf
[extension.jpg]
loop-file=inf
[extension.webp]
loop-file=inf
