# mise (runtime manager) configuration
# https://mise.jdx.dev/

[settings]
# Install missing tools automatically
auto_install = true
# Ensure mise tool paths/shims are placed ahead of system PATH
activate_aggressive = true
# Use verbose output
verbose = false
# Use precompiled ruby binaries (silences 2026.8.0 warning)
ruby.compile = false

[tools]
# Node.js
node = ["lts", "24"]

# Python
python = ["3.12", "3.11"]

# Go
go = "latest"

# Rust
rust = "latest"

# Ruby
ruby = "3.3"

# Java
java = "21"

# Deno
deno = "latest"

# Bun
bun = "latest"

# Zig
zig = "latest"

# CLI Tools
atuin = "latest"
bat = "latest"
codex = "latest"
eza = "latest"
gping = "latest"
ripgrep = "latest"
ruff = "latest"
yazi = "latest"
zellij = "latest"
zoxide = "latest"

# Python tools
poetry = "latest"
uv = "latest"
"pipx:aider-chat" = "latest"

# AI tools
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@google/gemini-cli" = "latest"

# Task runners
task = "latest"
just = "latest"

[env]
# Environment variables to set
MISE_EXPERIMENTAL = "1"
