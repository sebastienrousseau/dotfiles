# Active profile - change this to switch configurations
dotfiles_version = "0.2.497"
profile = "laptop"

# Visual theme
theme = "catppuccin-mocha"

# Terminal settings
terminal_font_family = "JetBrainsMono Nerd Font"
terminal_font_size = 12
default_shell = "fish" # zsh, fish, or nu

# Git identity (should be set via chezmoi init prompts or local overrides)
name = ""
email = ""
signingkey = ""

# ============================================================================
# Feature Flags
# ============================================================================
[features]
# Core shell
zsh = true
fish = true
nushell = true
starship = true

# Shell hardening
alias_wrapper = false

# Editors
nvim = true

# Terminal multiplexers
tmux = true
zellij = false

# ============================================================================
# Tool-specific configuration
# ============================================================================

[tools]
# Node.js version manager
node_manager = "mise"  # mise, fnm, or nvm

# ============================================================================
# Alias Buckets (per-machine toggle support)
# ============================================================================
#
# Override these in ~/.config/chezmoi/chezmoi.toml under [data.aliases.buckets]
# to enable/disable alias groups per host.
#
# Example:
# [data.aliases.buckets]
# system = false
# svn = false
# ============================================================================
# Fleet & Telemetry (Enterprise)
# ============================================================================
[fleet]
enabled = false
telemetry = false  # Opt-in structured event emission
endpoint = ""      # HTTPS endpoint for fleet event sink
node_id = ""       # Unique identifier for this machine in the fleet
namespace = ""     # Org/team namespace for multi-tenant isolation

# ============================================================================
# Namespace Profiles (Multi-Tenant)
# ============================================================================
# Define team-specific overrides. The active namespace is set by fleet.namespace.
# Each namespace inherits all top-level settings, then applies overrides.
[namespaces.default]
# Base namespace — no overrides, uses top-level values

[namespaces.engineering]
theme = "catppuccin-mocha"
default_shell = "fish"

[namespaces.security]
theme = "catppuccin-mocha"
default_shell = "zsh"

[namespaces.ops]
theme = "catppuccin-latte"
default_shell = "fish"

[aliases.buckets]
system = true
svn = true

[aliases.policy]
# When true:
# - destructive aliases require explicit confirmation
# - chezmoi apply runs alias governance in strict mode first
strict_mode = false
