# ============================================================================
# Theme SSOT Manifest — Single Source of Truth for all color definitions
# ============================================================================
# Every template in the fleet reads from this file via {{ .themes.<name> }}.
# To add a theme: define [themes.<name>] with term, ui, and app sections.
# Catppuccin themes additionally define [themes.<name>.ext] for GTK CSS.

# ============================================================================
# Catppuccin Family
# ============================================================================

[themes.catppuccin-mocha]
mode = "dark"
family = "catppuccin"

[themes.catppuccin-mocha.term]
